<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANGUARD // PERSONNEL TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0B0E14;
    --panel:#131822;
    --panel-alt:#1A2130;
    --amber:#FFB238;
    --amber-dim:#C98A2A;
    --threat:#E4572E;
    --text:#E8E6DD;
    --text-dim:#8A93A6;
    --success:#6FCF97;
    --border:#2A3345;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--void);color:var(--text);
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    min-height:100vh;position:relative;overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;z-index:9999;
  }
  .disp{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .dim{color:var(--text-dim);}
  .amber{color:var(--amber);}
  .threat{color:var(--threat);}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--panel);flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse 2.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .brand-title{font-size:15px;font-weight:600;letter-spacing:0.08em;}
  .brand-sub{font-size:10px;color:var(--text-dim);letter-spacing:0.12em;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .who{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;}

  select{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;border-radius:2px;letter-spacing:0.03em;}
  button{cursor:pointer;border:1px solid var(--amber-dim);background:transparent;color:var(--amber);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;padding:9px 14px;border-radius:2px;transition:all .15s;text-transform:uppercase;}
  button:hover{background:rgba(255,178,56,0.1);}
  button.primary{background:var(--amber);color:#1a1206;border-color:var(--amber);font-weight:600;}
  button.primary:hover{background:#ffc35e;}
  button.ghost{border-color:var(--border);color:var(--text-dim);}
  button.ghost:hover{color:var(--text);border-color:var(--text-dim);}
  button.danger{border-color:var(--threat);color:var(--threat);}
  button.small{padding:5px 9px;font-size:10px;}
  button:disabled{opacity:0.4;cursor:not-allowed;}

  .layout{display:flex;min-height:calc(100vh - 64px);}
  .nav{width:190px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel);padding:18px 0;}
  .nav-item{padding:12px 22px;font-size:12px;letter-spacing:0.08em;cursor:pointer;color:var(--text-dim);border-left:2px solid transparent;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;}
  .nav-item:hover{color:var(--text);}
  .nav-item.active{color:var(--amber);border-left-color:var(--amber);background:rgba(255,178,56,0.06);}
  .main{flex:1;padding:26px;max-width:1040px;}

  .bracket-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--amber-dim);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .bracket-label::before{content:"[";color:var(--border);}
  .bracket-label::after{content:"]";color:var(--border);}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:22px;margin-bottom:20px;}
  .panel-title{font-size:22px;font-weight:600;margin-bottom:4px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:760px){.grid2{grid-template-columns:1fr;} .layout{flex-direction:column;} .nav{width:100%;display:flex;overflow-x:auto;padding:0;} .nav-item{border-left:none;border-bottom:2px solid transparent;white-space:nowrap;} .nav-item.active{border-left-color:transparent;border-bottom-color:var(--amber);}}

  .gauge-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .gauge{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
  .gauge-inner{width:112px;height:112px;border-radius:50%;background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .gauge-pct{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:var(--amber);}
  .gauge-label{font-size:9px;color:var(--text-dim);letter-spacing:0.1em;margin-top:2px;}

  .loc-row{margin-bottom:14px;}
  .loc-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
  .loc-name{font-weight:500;}
  .loc-pct{font-family:'IBM Plex Mono',monospace;color:var(--amber);}
  .bar-track{height:8px;background:var(--panel-alt);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transition:width .4s;}
  .loc-target{font-size:10px;color:var(--text-dim);margin-top:3px;font-family:'IBM Plex Mono',monospace;}

  .stat-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .stat-row:last-child{border-bottom:none;}
  .stat-val{font-family:'IBM Plex Mono',monospace;color:var(--amber);}
  .status-pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;letter-spacing:0.08em;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;border:1px solid currentColor;}
  .status-active{color:var(--success);}
  .status-alert{color:var(--amber);}
  .status-standby, .status-reserve, .status-deep{color:var(--threat);}
  .pill{display:inline-block;padding:3px 10px;border-radius:3px;font-size:11px;letter-spacing:0.05em;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;background:var(--panel-alt);border:1px solid var(--border);}
  .pill.rank{color:var(--amber);border-color:var(--amber-dim);}
  .pill.eligible{color:var(--success);border-color:var(--success);}
  .pill.not-eligible{color:var(--threat);border-color:var(--threat);}

  .sub-bars{margin-top:12px;}
  .sub-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:11px;}
  .sub-bar-label{width:130px;color:var(--text-dim);flex-shrink:0;}
  .sub-bar-track{flex:1;height:5px;background:var(--panel-alt);border-radius:2px;overflow:hidden;}
  .sub-bar-fill{height:100%;background:var(--amber-dim);}
  .sub-bar-val{width:34px;text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);}

  label{display:block;font-size:11px;letter-spacing:0.05em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
  .field{margin-bottom:16px;}
  input[type=number], input[type=text], input[type=password], textarea{
    width:100%;background:var(--panel-alt);color:var(--text);border:1px solid var(--border);
    padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:14px;border-radius:2px;
  }
  .radio-group{display:flex;gap:10px;flex-wrap:wrap;}
  .radio-opt{flex:1;min-width:140px;border:1px solid var(--border);padding:10px 12px;border-radius:2px;cursor:pointer;font-size:12px;text-align:center;color:var(--text-dim);}
  .radio-opt.sel{border-color:var(--amber);color:var(--amber);background:rgba(255,178,56,0.07);}
  .loc-pick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  @media(max-width:600px){.loc-pick{grid-template-columns:1fr;}}
  .loc-opt{border:1px solid var(--border);padding:10px;border-radius:2px;cursor:pointer;font-size:11px;}
  .loc-opt.sel{border-color:var(--amber);background:rgba(255,178,56,0.07);}
  .loc-opt-name{font-weight:600;margin-bottom:2px;}
  .loc-opt-obj{color:var(--text-dim);font-size:10px;}

  .feedback{margin-top:16px;padding:14px 16px;border-left:3px solid var(--amber);background:var(--panel-alt);font-size:13px;line-height:1.5;border-radius:2px;}
  .feedback.cap{border-left-color:var(--threat);}
  .feedback.win{border-left-color:var(--success);}

  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-weight:500;padding:8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.05em;font-size:10px;}
  td{padding:9px 8px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;}
  tr:last-child td{border-bottom:none;}
  tr.clickable{cursor:pointer;}
  tr.clickable:hover{background:var(--panel-alt);}

  .empty{text-align:center;padding:40px 20px;color:var(--text-dim);}
  .empty-title{font-size:14px;margin-bottom:6px;color:var(--text);}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:24px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;}

  .info-note{font-size:11px;color:var(--text-dim);line-height:1.6;margin-top:10px;padding:10px 12px;background:var(--panel-alt);border-radius:2px;}
  .toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px;}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{max-width:480px;width:100%;}
  .login-title{font-size:26px;text-align:center;margin-bottom:6px;}
  .login-sub{text-align:center;color:var(--text-dim);font-size:12px;margin-bottom:30px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.08em;}
  .roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  @media(max-width:480px){.roster-grid{grid-template-columns:1fr;}}
  .roster-card{border:1px solid var(--border);border-radius:3px;padding:16px;cursor:pointer;text-align:center;background:var(--panel);}
  .roster-card:hover{border-color:var(--amber-dim);}
  .avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:#1a1206;}
  .roster-name{font-weight:600;font-size:13px;letter-spacing:0.04em;}
  .roster-id{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;}

  .swatch-row{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:var(--text);}

  .exercise-pending{border:1px solid var(--border);border-radius:2px;padding:10px 12px;margin-bottom:8px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .set-row{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
  .set-row input{flex:1;}
  .set-row span{width:16px;text-align:center;color:var(--text-dim);font-size:11px;}

  .dossier-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:16px;}
  .dossier-avatar{width:64px;height:64px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:26px;font-weight:600;color:#1a1206;flex-shrink:0;}
  .field-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center;}
  .field-row:last-child{border-bottom:none;}
  .field-label{color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;}

  .chat-scroll{max-height:480px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-right:4px;}
  .chat-msg{padding:10px 14px;border-radius:2px;font-size:13px;max-width:80%;}
  .chat-msg.mine{align-self:flex-end;background:rgba(255,178,56,0.1);border:1px solid var(--amber-dim);}
  .chat-msg.theirs{align-self:flex-start;background:var(--panel-alt);border:1px solid var(--border);}
  .chat-msg.command{align-self:center;max-width:90%;background:rgba(255,178,56,0.08);border:1px solid var(--amber);}
  .chat-meta{font-size:10px;color:var(--text-dim);margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}
  .chat-input-row{display:flex;gap:8px;}
  .chat-input-row input{flex:1;}
  .campaign-card{border:1px solid var(--border);border-radius:3px;padding:16px;margin-bottom:14px;}
  .campaign-card.deployed{border-color:var(--amber);}
  .status-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.05em;}
  .status-tag.recruiting{color:var(--success);border:1px solid var(--success);}
  .status-tag.active{color:var(--amber);border:1px solid var(--amber);}
  .status-tag.success{color:var(--success);border:1px solid var(--success);background:rgba(111,207,151,0.1);}
  .status-tag.failed{color:var(--threat);border:1px solid var(--threat);}

  .mini-chat{position:fixed;bottom:16px;right:16px;width:280px;background:var(--panel);border:1px solid var(--amber-dim);border-radius:4px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
  .mini-chat-head{padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--amber);display:flex;justify-content:space-between;align-items:center;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;}
  .mini-chat-body{max-height:220px;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
  .mini-chat-msg{font-size:11px;line-height:1.4;}
  .mini-chat-msg .who{color:var(--amber-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;}
  @media(max-width:760px){.mini-chat{width:calc(100% - 32px);}}

  .codex-entry{border:1px solid var(--border);border-radius:3px;padding:14px 16px;margin-bottom:12px;}
  .codex-entry-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .codex-cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}

  .protocol-card{border:1px solid var(--border);border-radius:3px;padding:14px;margin-bottom:10px;}
  .protocol-card.full{opacity:0.5;}
</style>
</head>

function todayStr(d) { d = d || new Date(); return d.toISOString().slice(0, 10); }
function daysBetween(a, b) { return Math.floor((new Date(b) - new Date(a)) / 86400000); }
function findLocationForCategory(camp, category) {
  if (!camp) return null;
  return camp.locations.find(l => l.category === category) || null;
}
function locationTarget(camp, loc) {
  if (camp.lockedTargets && camp.lockedTargets[loc.id] !== undefined) return camp.lockedTargets[loc.id];
  if (loc.manualTarget) return loc.manualTarget;
  const rate = CAMPAIGN_BASE_RATES[loc.category] || CAMPAIGN_BASE_RATES.generic;
  const weeks = camp.durationDays / 7;
  const count = Math.max(1, camp.deployedOperatorIds.length);
  return Math.round(rate * weeks * count);
}
function campaignPhase(camp) {
  if (camp.resolved) return camp.resolved;
  if (!camp.lockedAt) return 'recruiting';
  return 'active';
}

function computeLocationProgress(camp, logs) {
  return camp.locations.map(loc => {
    const target = locationTarget(camp, loc);
    const relevant = logs.filter(l => l.type === 'campaign' && l.campaignId === camp.id && l.locationId === loc.id);
    const groups = {};
    relevant.forEach(l => { const key = l.operatorId + '_' + l.date; (groups[key] = groups[key] || []).push(l); });
    let total = 0;
    Object.values(groups).forEach(entries => {
      entries.sort((a,b) => a.timestamp - b.timestamp);
      entries.forEach((e, idx) => { total += idx === 0 ? e.amount : e.amount * 0.5; });
    });
    const pct = target > 0 ? Math.min(100, (total / target) * 100) : 0;
    return Object.assign({}, loc, { total: Math.round(total * 10) / 10, target: target, pct: pct });
  });
}
function computePlanetControl(locProgress) {
  if (locProgress.length === 0) return 0;
  return locProgress.reduce((s, l) => s + l.pct, 0) / locProgress.length;
}

function computeBaselineImprovement(operator) {
  if (!operator.baseline || !operator.previousBaseline) return null;
  const metrics = ['pushups','pullups','squats','plankSeconds'];
  const changes = [];
  metrics.forEach(m => {
    const prev = operator.previousBaseline[m], cur = operator.baseline[m];
    if (prev > 0 && cur !== undefined) changes.push(((cur - prev) / prev) * 100);
  });
  if (changes.length === 0) return null;
  const avgChange = changes.reduce((a,b)=>a+b,0) / changes.length;
  const score = Math.max(0, Math.min(100, 50 + avgChange * 5));
  return { score: Math.round(score), avgChange: Math.round(avgChange*10)/10 };
}

function computeStreak(operatorId, logs) {
  const days = new Set(logs.filter(l=>l.operatorId===operatorId).map(l=>l.date));
  let streak = 0; let cursor = new Date();
  if (!days.has(todayStr())) cursor.setDate(cursor.getDate()-1);
  while (days.has(todayStr(cursor))) { streak++; cursor.setDate(cursor.getDate()-1); }
  return streak;
}

function computeORS(operatorId, operator, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  const firstLogDate = opLogs.length ? opLogs.reduce((min,l) => l.date < min ? l.date : min, opLogs[0].date) : todayStr();
  const windowDays = Math.min(30, Math.max(1, daysBetween(firstLogDate, todayStr()) + 1));
  const uniqueDaysWithLog = new Set(opLogs.map(l => l.date)).size;
  const protocolSessionDays = new Set(opLogs.filter(l => l.type === 'protocol').map(l => l.date)).size;
  const campaignLogs = opLogs.filter(l => l.type === 'campaign');
  const uniqueCampaignDays = new Set(campaignLogs.map(l => l.date)).size;
  const scheduledSessions = (operator.weeklyTarget / 7) * windowDays;
  const protocolCompletionRate = scheduledSessions > 0 ? Math.min(100, (protocolSessionDays / scheduledSessions) * 100) : 0;
  const aarSubmissionRate = Math.min(100, (uniqueDaysWithLog / windowDays) * 100);
  const campaignActiveDayRate = Math.min(100, (uniqueCampaignDays / windowDays) * 100);
  const baselineImp = computeBaselineImprovement(operator);
  const physicalVal = baselineImp ? (0.70*protocolCompletionRate + 0.30*baselineImp.score) : protocolCompletionRate;
  const activeHabits = (operator.habits || []).filter(h => h.active);
  let personalDevVal = null;
  if (activeHabits.length > 0) {
    const habitLogs = opLogs.filter(l => l.type === 'habit');
    const possibleCheckins = activeHabits.length * windowDays;
    personalDevVal = possibleCheckins > 0 ? Math.min(100, (habitLogs.length / possibleCheckins) * 100) : 0;
  }
  const components = [
    { key:'physical', weight:0.30, value: physicalVal, available: true },
    { key:'discipline', weight:0.30, value: aarSubmissionRate, available: true },
    { key:'personalDev', weight:0.20, value: personalDevVal, available: personalDevVal !== null },
    { key:'squad', weight:0.20, value: campaignActiveDayRate, available: true },
  ];
  const availWeightSum = components.filter(c=>c.available).reduce((s,c)=>s+c.weight,0);
  let ors = 0;
  components.forEach(c => { if (c.available) ors += (c.weight/availWeightSum) * c.value; });
  ors = Math.round(ors);
  return { ors: ors, physical: Math.round(physicalVal), discipline: Math.round(aarSubmissionRate),
    squad: Math.round(campaignActiveDayRate), personalDev: personalDevVal!==null?Math.round(personalDevVal):null,
    windowDays: windowDays, baselineImp: baselineImp };
}

function nonCampaignMCP(operatorId, logs) {

  return new Set(opLogs.map(l => l.date)).size * 10;
}
function computeMCP(operatorId, campaigns, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  const protocolDays = new Set(opLogs.filter(l=>l.type==='protocol').map(l=>l.date)).size;
  const campaignEntries = opLogs.filter(l=>l.type==='campaign').length;
  let mcp = protocolDays*10 + campaignEntries*5;
  campaigns.forEach(camp => { if (camp.resolved === 'success' && opLogs.some(l => l.type==='campaign' && l.campaignId===camp.id)) mcp += 50; });
  return mcp;
}

// Readiness status now weighs BOTH the gap since your last log AND your rolling logging
// frequency — sparse-but-technically-recent logging will decay status, not just full inactivity.
const STATUS_TIERS = [
  {label:'Active', cls:'status-active'}, {label:'Alert', cls:'status-alert'},
  {label:'Standby', cls:'status-standby'}, {label:'Reserve', cls:'status-reserve'}, {label:'Deep Reserve', cls:'status-deep'},
];
function computeReadinessStatus(operatorId, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  if (opLogs.length === 0) return Object.assign({days:0}, STATUS_TIERS[0]);
  const lastDate = opLogs.reduce((max,l) => l.date > max ? l.date : max, opLogs[0].date);
  const gapDays = daysBetween(lastDate, todayStr());
  const gapTierIdx = gapDays<=7?0:gapDays<=14?1:gapDays<=30?2:gapDays<=60?3:4;

  const firstLogDate = opLogs.reduce((min,l) => l.date < min ? l.date : min, opLogs[0].date);
  const historyDays = daysBetween(firstLogDate, todayStr()) + 1;
  let rateTierIdx = 0;
  if (historyDays >= 7) {
    const rateWindow = Math.min(14, historyDays);
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - (rateWindow - 1));
    const uniqueDays = new Set(opLogs.filter(l => new Date(l.date) >= cutoff).map(l => l.date)).size;
    const rate = uniqueDays / rateWindow;
    rateTierIdx = rate>=0.5?0:rate>=0.3?1:rate>=0.15?2:rate>0?3:4;
  }
  const finalIdx = Math.max(gapTierIdx, rateTierIdx);
  return Object.assign({days: gapDays}, STATUS_TIERS[finalIdx]);
}

// Rank now requires ORS + lifetime Days Active + Campaigns Completed, checked top-down.
function operatorRankStats(operatorId, logs, campaigns) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  const daysActive = new Set(opLogs.map(l => l.date)).size;
  const campaignsCompleted = campaigns.filter(c => c.resolved === 'success' && opLogs.some(l => l.type === 'campaign' && l.campaignId === c.id)).length;
  return { daysActive, campaignsCompleted };
}
function computeRank(ors, operatorId, logs, campaigns, status) {
  const stats = operatorRankStats(operatorId, logs, campaigns);
  for (let i = RANK_ORDER.length - 1; i >= 1; i--) {
    const rank = RANK_ORDER[i];
    const req = RANK_REQUIREMENTS[rank];
    if (status.label === 'Active' && ors >= req.ors && stats.daysActive >= req.daysActive && stats.campaignsCompleted >= req.campaigns) return rank;
  }
  return 'Recruit';
}
function nextRankInfo(currentRank, ors, operatorId, logs, campaigns, status) {
  const idx = RANK_ORDER.indexOf(currentRank);
  if (idx === -1 || idx === RANK_ORDER.length - 1) return null;
  const next = RANK_ORDER[idx+1];
  const req = RANK_REQUIREMENTS[next];
  const stats = operatorRankStats(operatorId, logs, campaigns);
  const eligible = status.label === 'Active' && ors >= req.ors && stats.daysActive >= req.daysActive && stats.campaignsCompleted >= req.campaigns;
  return { next: next, req: req, stats: stats, eligible: eligible };
}

  const [squats, setSquats] = useState('');
  const [plank, setPlank] = useState('');
  const [runMinutes, setRunMinutes] = useState('');
  function finishAssessment() {
    const pu = parseFloat(pushups)||0, pl = parseFloat(pullups)||0, sq = parseFloat(squats)||0, pk = parseFloat(plank)||0;
    let pts = 0;
    pts += pu>=41?4:pu>=26?3:pu>=11?2:pu>=1?1:0;
    pts += pl>=13?4:pl>=8?3:pl>=3?2:pl>=0?1:0;
    pts += pk>=180?4:pk>=120?3:pk>=60?2:pk>0?1:0;
    let tier = pts>=15?'Peak Tier':pts>=12?'Advanced Tier':pts>=8?'Development Tier':'Foundation Tier';
    onComplete(Object.assign({}, op, { onboarded: true,
      baseline: { pushups: pu, pullups: pl, squats: sq, plankSeconds: pk, runMinutes: parseFloat(runMinutes)||0, score: pts, tier: tier, date: todayStr() } }));
  }
  if (step === 'oath') {
    return (
      <div className="login-wrap">
        <div className="login-card" style={{maxWidth:600}}>
          <div className="panel">
            <div className="bracket-label">Vanguard Codex — World Briefing</div>
            <div style={{fontSize:12,lineHeight:1.7,color:'var(--text-dim)',marginBottom:16}}>{DEFAULT_CODEX_ENTRIES[0].body}</div>
            <div style={{fontSize:11,color:'var(--text-dim)'}}>Full lore, planet, and enemy intel available anytime in the Codex tab once you're activated.</div>
          </div>
          <div className="panel">
            <div className="dim mono" style={{fontSize:11,marginBottom:10,letterSpacing:'0.08em'}}>INCOMING TRANSMISSION — SOURCE: VANGUARD COMMAND — PRIORITY ONE</div>
            <div style={{fontSize:13,lineHeight:1.8,marginBottom:20}}>
              Candidate.<br/><br/>
              Numbers tell us what you can do today. They don't tell us whether you'll be here in six months.<br/><br/>
              The Kharvax Swarm doesn't wait for motivation. Neither does the work.<br/><br/>
              So before your file moves from Candidate to Recruit, Command needs your word.
            </div>
            <div style={{borderTop:'1px solid var(--border)', borderBottom:'1px solid var(--border)', padding:'18px 0', fontSize:13, lineHeight:2, marginBottom:20}}>
              I am not here because I am already strong.<br/>
              I am here because I choose to become stronger.<br/>
              I will show up — not perfectly, but consistently.<br/>
              I will measure myself against who I was, not who anyone else is.<br/>
              I will log the truth, even on the days the truth is a missed one.<br/>
              I need to be one Command can count on.<br/>
              This is the Vanguard Oath. I accept it.
            </div>
            <button className="primary" style={{width:'100%'}} onClick={()=>setStep('assessment')}>[ I ACCEPT ]</button>
          </div>
        </div>
      </div>
    );
  }
  return (
    <div className="login-wrap">
      <div className="login-card" style={{maxWidth:480}}>
        <div className="panel">
          <div className="bracket-label">Baseline Assessment</div>
          <div className="dim" style={{fontSize:12,marginBottom:16}}>Record your current starting point, {op.callsign}.</div>
          <div className="field"><label>Max Push-Ups</label><input type="number" value={pushups} onChange={e=>setPushups(e.target.value)} /></div>
          <div className="field"><label>Max Pull-Ups</label><input type="number" value={pullups} onChange={e=>setPullups(e.target.value)} /></div>
          <div className="field"><label>Bodyweight Squats in 2 Minutes</label><input type="number" value={squats} onChange={e=>setSquats(e.target.value)} /></div>
          <div className="field"><label>Plank Hold (seconds)</label><input type="number" value={plank} onChange={e=>setPlank(e.target.value)} /></div>
          <div className="field"><label>1.5 Mile Run Time (minutes, optional)</label><input type="number" value={runMinutes} onChange={e=>setRunMinutes(e.target.value)} /></div>
          <button className="primary" style={{width:'100%'}} onClick={finishAssessment}>Complete Assessment — Activate Recruit Status</button>
        </div>
      </div>
    </div>
  );
}

async function fetchAllData() {
  const { data: profileRows } = await sb.from('profiles').select('*');
  const { data: habitRows } = await sb.from('habits').select('*');
  const { data: squadRows } = await sb.from('squads').select('*');
  const { data: squadMemberRows } = await sb.from('squad_members').select('*');
  let squads = (squadRows||[]).map(s => rowToSquad(s, (squadMemberRows||[]).filter(m=>m.squad_id===s.id)));
  let ops = (profileRows||[]).map(p => {
    const memberRow = (squadMemberRows||[]).find(m => m.operator_id === p.id);
    const op = rowToOperator(p, (habitRows||[]).filter(h=>h.operator_id===p.id).map(rowToHabit));
    op.squadId = memberRow ? memberRow.squad_id : null;
    op.squadRole = memberRow ? memberRow.role : null;
    return op;
  });

  const { data: campRows } = await sb.from('campaigns').select('*');
  const { data: locRows } = await sb.from('locations').select('*');
  let camps = (campRows||[]).map(c => rowToCampaign(c, (locRows||[]).filter(l=>l.campaign_id===c.id)));
  if (camps.length === 0) {
    const seeded = await seedDefaultCampaign();
    if (seeded) camps = [seeded];
  }

  const { data: logRows } = await sb.from('logs').select('*');
  const lgs = (logRows||[]).map(rowToLog);

  const { data: chatRows } = await sb.from('chat_messages').select('*').order('timestamp', {ascending:true});
  const ch = (chatRows||[]).map(rowToChat);

  const { data: codexRows } = await sb.from('codex_entries').select('*');
  const cx = (codexRows && codexRows.length) ? codexRows.map(rowToCodex) : DEFAULT_CODEX_ENTRIES;

  // auto-lock join windows / auto-resolve campaigns, writing back any changes
  for (let i = 0; i < camps.length; i++) {
    let c = camps[i];
    if (!c.lockedAt && daysBetween(c.startDate, todayStr()) >= c.joinWindowDays) {
      const count = Math.max(1, c.deployedOperatorIds.length);
      const targets = {}; c.locations.forEach(loc => { targets[loc.id] = locationTarget(c, loc); });
      await sb.from('campaigns').update({ locked_at: todayStr(), locked_targets: targets, locked_deployed_count: count }).eq('id', c.id);
      c = Object.assign({}, c, { lockedAt: todayStr(), lockedTargets: targets, lockedDeployedCount: count });
      camps[i] = c;
    }
    if (!c.resolved && c.lockedAt) {
      const locProg = computeLocationProgress(c, lgs);
      const pct = computePlanetControl(locProg);
      if (pct >= 100) { await sb.from('campaigns').update({resolved:'success'}).eq('id', c.id); camps[i] = Object.assign({}, c, {resolved:'success'}); }
      else if (daysBetween(c.startDate, todayStr()) >= c.durationDays) { await sb.from('campaigns').update({resolved:'failed'}).eq('id', c.id); camps[i] = Object.assign({}, c, {resolved:'failed'}); }
    }
  }

  return { ops, camps, lgs, ch, cx, squads };
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [session, setSession] = useState(null);
  const [operators, setOperators] = useState([]);
  const [campaigns, setCampaigns] = useState([]);
  const [logs, setLogs] = useState([]);
  const [chat, setChat] = useState([]);
  const [codexEntries, setCodexEntries] = useState([]);
  const [squads, setSquads] = useState([]);
  const [tab, setTab] = useState('command');
  const [showReset, setShowReset] = useState(false);
  const [viewDossierId, setViewDossierId] = useState(null);
  const [rankUpModal, setRankUpModal] = useState(null);

  useEffect(() => {
    sb.auth.getSession().then(({data}) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => sub.subscription.unsubscribe();
  }, []);

  async function refetchAll() {
    const { ops, camps, lgs, ch, cx, squads } = await fetchAllData();
    setOperators(ops); setCampaigns(camps); setLogs(lgs); setChat(ch); setCodexEntries(cx); setSquads(squads);
  }

  useEffect(() => {
    if (!session) { setLoaded(false); return; }
    (async () => { await refetchAll(); setLoaded(true); })();
  }, [session]);

  // realtime chat subscription
  useEffect(() => {
    if (!session) return;
    const channel = sb.channel('chat-realtime')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, (payload) => {
        setChat(prev => prev.some(m=>m.id===payload.new.id) ? prev : prev.concat([rowToChat(payload.new)]));
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [session]);

  async function addLogs(entries) {
    await sb.from('logs').insert(entries.map(logToRow));
    await refetchAll();
  }
  async function updateOperator(updatedOp) {
    const old = operators.find(o=>o.id===updatedOp.id) || {};
    const patch = {};
    Object.keys(OP_FIELD_MAP).forEach(k => { if (JSON.stringify(updatedOp[k]) !== JSON.stringify(old[k])) patch[k] = updatedOp[k]; });
    if (Object.keys(patch).length) await sb.from('profiles').update(operatorToRowPatch(patch)).eq('id', updatedOp.id);
    await refetchAll();
  }
  async function updateOperators(newOps) {
    const removed = operators.filter(o => !newOps.some(n=>n.id===o.id));
    for (const r of removed) await sb.from('profiles').delete().eq('id', r.id);
    for (const o of newOps) {
      const old = operators.find(x=>x.id===o.id);
      if (!old) continue;
      const patch = {};
      Object.keys(OP_FIELD_MAP).forEach(k => { if (JSON.stringify(o[k]) !== JSON.stringify(old[k])) patch[k]=o[k]; });
      if (Object.keys(patch).length) await sb.from('profiles').update(operatorToRowPatch(patch)).eq('id', o.id);
    }
    await refetchAll();
  }
  async function updateCampaigns(newCamps) {
    for (const nc of newCamps) {
      const old = campaigns.find(c=>c.id===nc.id);
      if (!old) {
        const { data: inserted } = await sb.from('campaigns').insert({
          name: nc.name, threat: nc.threat, sector: nc.sector, start_date: nc.startDate,
          join_window_days: nc.joinWindowDays, duration_days: nc.durationDays,
        }).select().single();
        if (inserted && nc.locations.length) {
          await sb.from('locations').insert(nc.locations.map(l => ({ campaign_id: inserted.id, name:l.name, objective:l.objective, category:l.category, unit:l.unit, manual_target:l.manualTarget })));
        }
        continue;
      }
      const patch = {};
      Object.keys(CAMP_FIELD_MAP).forEach(k => { if (JSON.stringify(nc[k]) !== JSON.stringify(old[k])) patch[k]=nc[k]; });
      if (Object.keys(patch).length) await sb.from('campaigns').update(campaignToRowPatch(patch)).eq('id', nc.id);
      const newLocIds = new Set(nc.locations.map(l=>l.id));
      const removedLocs = old.locations.filter(l=>!newLocIds.has(l.id));
      for (const rl of removedLocs) await sb.from('locations').delete().eq('id', rl.id);
      for (const nl of nc.locations) {
        const oldLoc = old.locations.find(l=>l.id===nl.id);
        if (!oldLoc) await sb.from('locations').insert({campaign_id: nc.id, name:nl.name, objective:nl.objective, category:nl.category, unit:nl.unit, manual_target:nl.manualTarget});
        else if (JSON.stringify(oldLoc)!==JSON.stringify(nl)) await sb.from('locations').update({name:nl.name, objective:nl.objective, category:nl.category, unit:nl.unit, manual_target:nl.manualTarget}).eq('id', nl.id);
      }
    }
    await refetchAll();
  }
  async function sendChat(msg) {
    await sb.from('chat_messages').insert(chatToRow(msg));
    // realtime subscription will pick up the insert; no need to refetch or setChat here
  }
  async function updateCodex(newEntries) {
    const old = codexEntries;
    const removed = old.filter(e => !newEntries.some(n=>n.id===e.id));
    for (const r of removed) await sb.from('codex_entries').delete().eq('id', r.id);
    for (const e of newEntries) {
      const oldE = old.find(x=>x.id===e.id);
      if (!oldE) await sb.from('codex_entries').insert({ category: e.category, title: e.title, body: e.body });
      else if (oldE.title!==e.title || oldE.body!==e.body) await sb.from('codex_entries').update({title:e.title, body:e.body}).eq('id', e.id);
    }
    await refetchAll();
  }
  async function resetAll() {
    await sb.from('logs').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    await sb.from('chat_messages').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    for (const c of campaigns) await sb.from('campaigns').delete().eq('id', c.id);
    for (const o of operators) await sb.from('profiles').update({ current_deployment_id: null, reinforcement_drops_available: 0, mcp_at_last_reinforcement: 0, last_seen_rank: 'Recruit' }).eq('id', o.id);
    await refetchAll();
    setShowReset(false);
  }
  async function deployToCampaign(op, camp) {
    if (op.currentDeploymentId) return;
    const phase = campaignPhase(camp);
    if (phase === 'recruiting') {
      await sb.from('campaigns').update({ deployed_operator_ids: camp.deployedOperatorIds.concat([op.id]) }).eq('id', camp.id);
      await sb.from('profiles').update({ current_deployment_id: camp.id }).eq('id', op.id);
    } else if (phase === 'active') {
      const capMax = Math.floor(0.2 * camp.lockedDeployedCount);
      if (op.reinforcementDropsAvailable < 1 || camp.reinforcementsUsed >= capMax) return;
      await sb.from('campaigns').update({ deployed_operator_ids: camp.deployedOperatorIds.concat([op.id]), reinforcements_used: camp.reinforcementsUsed + 1 }).eq('id', camp.id);
      await sb.from('profiles').update({ current_deployment_id: camp.id, reinforcement_drops_available: op.reinforcementDropsAvailable - 1 }).eq('id', op.id);
    } else return;
    await refetchAll();
  }
  async function undeploy(op) { await sb.from('profiles').update({current_deployment_id: null}).eq('id', op.id); await refetchAll(); }
  async function claimReinforcement(op) { await sb.from('profiles').update({reinforcement_drops_available: 1, mcp_at_last_reinforcement: nonCampaignMCP(op.id, logs)}).eq('id', op.id); await refetchAll(); }
  async function addHabit(op, name) { await sb.from('habits').insert({operator_id: op.id, name: name, active: true, created_date: todayStr()}); await refetchAll(); }
  async function toggleHabitArchive(op, habitId) {
    const h = op.habits.find(h=>h.id===habitId);
    await sb.from('habits').update({active: !h.active}).eq('id', habitId);
    await refetchAll();
  }
  async function logHabitCheckin(op, habitId) {
    if (logs.some(l => l.type==='habit' && l.operatorId===op.id && l.habitId===habitId && l.date===todayStr())) return;
    await addLogs([{ id: crypto.randomUUID(), operatorId: op.id, type:'habit', habitId: habitId, date: todayStr(), timestamp: Date.now() }]);
  }
  async function saveCustomProtocol(op, protocol) {
    if (!op.customProtocols.some(p=>p.id===protocol.id) && op.customProtocols.length>=5) return false;
    const existingIdx = op.customProtocols.findIndex(p=>p.id===protocol.id);
    let newList;
    if (existingIdx>=0) { newList = op.customProtocols.slice(); newList[existingIdx]=protocol; }
    else newList = op.customProtocols.concat([protocol]);
    await sb.from('profiles').update({custom_protocols: newList}).eq('id', op.id);
    await refetchAll();
    return true;
  }
  async function deleteCustomProtocol(op, protocolId) {
    await sb.from('profiles').update({custom_protocols: op.customProtocols.filter(p=>p.id!==protocolId)}).eq('id', op.id);
    await refetchAll();
  }

  async function createSquad(op, name) {
    if (op.squadId) return false;
    const { data: squad, error } = await sb.from('squads').insert({ name: name }).select().single();
    if (error || !squad) return false;
    await sb.from('squad_members').insert({ squad_id: squad.id, operator_id: op.id, role: 'leader' });
    await refetchAll();
    return true;
  }
  async function joinSquad(op, squad) {
    if (op.squadId) return false;
    if (squad.members.length >= 10) return false;
    await sb.from('squad_members').insert({ squad_id: squad.id, operator_id: op.id, role: 'member' });
    await refetchAll();
    return true;
  }
  async function leaveSquad(op) {
    await sb.from('squad_members').delete().eq('operator_id', op.id);
    await refetchAll();
  }
  async function promoteOfficer(squad, operatorId) {
    const officerCount = squad.members.filter(m=>m.role==='officer').length;
    if (officerCount >= 3) return false;
    await sb.from('squad_members').update({ role: 'officer' }).eq('squad_id', squad.id).eq('operator_id', operatorId);
    await refetchAll();
    return true;
  }
  async function demoteOfficer(squad, operatorId) {
    await sb.from('squad_members').update({ role: 'member' }).eq('squad_id', squad.id).eq('operator_id', operatorId);
    await refetchAll();
  }
  async function removeMember(squad, operatorId) {
    await sb.from('squad_members').delete().eq('squad_id', squad.id).eq('operator_id', operatorId);
    await refetchAll();
  }
  async function renameSquad(squad, newName) {
    await sb.from('squads').update({ name: newName }).eq('id', squad.id);
    await refetchAll();
  }
  async function disbandSquad(squad) {
    await sb.from('squads').delete().eq('id', squad.id);
    await refetchAll();
  }

  async function signOut() { await sb.auth.signOut(); }

  const op = (session && loaded) ? operators.find(o => o.id === session.user.id) : null;
  const opOnboarded = op && op.onboarded;
  const statusTop = opOnboarded ? computeReadinessStatus(op.id, logs) : null;
  const orsDataTop = opOnboarded ? computeORS(op.id, op, logs) : null;
  const currentRankTop = opOnboarded ? computeRank(orsDataTop.ors, op.id, logs, campaigns, statusTop) : null;
  const deployedCampaignTop = (opOnboarded && op.currentDeploymentId) ? campaigns.find(c => c.id === op.currentDeploymentId) : null;

  // Hook runs unconditionally every render and guards its own logic internally —
  // never place this after an early return, or React's hook order breaks.
  useEffect(() => {
    if (!loaded || !opOnboarded || !currentRankTop || !op) return;
    if (RANK_ORDER.indexOf(currentRankTop) > RANK_ORDER.indexOf(op.lastSeenRank || 'Recruit')) {
      setRankUpModal(currentRankTop);
      updateOperator(Object.assign({}, op, {lastSeenRank: currentRankTop}));
    }
  }, [currentRankTop, loaded, opOnboarded]);

  if (!session) return <Login onAuthed={()=>{}} />;
  if (!loaded) return <div style={{padding:40,fontFamily:'IBM Plex Mono, monospace',color:'#8A93A6'}}>ESTABLISHING UPLINK...</div>;
  if (!op) return <div style={{padding:40,fontFamily:'IBM Plex Mono, monospace',color:'#8A93A6'}}>PROVISIONING PERSONNEL FILE... (refresh in a moment if this persists)</div>;
  if (!op.onboarded) return <Onboarding op={op} onComplete={(updatedOp)=>{ updateOperator(updatedOp); }} />;

  const dossierOp = viewDossierId ? operators.find(o=>o.id===viewDossierId) : op;
  const noAdminExists = !operators.some(o => o.isAdmin);
  const streak = computeStreak(op.id, logs);

  return (
    <div>
      <div className="topbar">
        <div className="brand" onClick={()=>{setTab('command'); setViewDossierId(null);}}>
          <div className="brand-dot"></div>
          <div><div className="disp brand-title">Vanguard // Personnel Terminal</div><div className="brand-sub">United Earth Alliance — Alpha Cell</div></div>
        </div>
        <div className="topbar-right">
          <div className="who"><Avatar op={op} size={28} /> {op.callsign}</div>
          <button className="ghost small" onClick={signOut}>Log Out</button>
          <button className="ghost small" onClick={() => setShowReset(true)}>Reset Test Data</button>
        </div>
      </div>

      {noAdminExists && (
        <div style={{background:'var(--panel-alt)',borderBottom:'1px solid var(--amber-dim)',padding:'10px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div style={{fontSize:12}}><span className="amber">No Command assigned.</span> <span className="dim">Claim it to manage Campaign settings, Codex, and roster.</span></div>
          <button className="primary small" onClick={()=>updateOperator(Object.assign({}, op, {isAdmin: true}))}>Claim Command ({op.callsign})</button>
        </div>
      )}

      <div className="layout">
        <div className="nav">
          {(op.isAdmin ? ['command','campaigns','log','myprotocols','habits','squad','dossier','roster','codex','comms','aar','admin'] : ['command','campaigns','log','myprotocols','habits','squad','dossier','roster','codex','comms','aar']).map(t => (
            <div key={t} className={"nav-item"+(tab===t?" active":"")} onClick={() => {setTab(t); if(t==='dossier') setViewDossierId(op.id);}}>
              {t==='command' && 'Command Center'}{t==='campaigns' && 'Campaigns'}{t==='log' && 'Log Activity'}
              {t==='myprotocols' && 'My Protocols'}{t==='habits' && 'Habits'}{t==='squad' && 'Squad'}{t==='dossier' && 'My Dossier'}{t==='roster' && 'Roster'}
              {t==='codex' && 'Codex'}{t==='comms' && 'Comms'}{t==='aar' && 'AAR Log'}{t==='admin' && 'Admin Panel'}
            </div>
          ))}
        </div>
        <div className="main">
          {tab==='command' && <CommandCenter operators={operators} campaigns={campaigns} logs={logs} activeOp={op} deployedCampaign={deployedCampaignTop} onGoCampaigns={()=>setTab('campaigns')} streak={streak} />}
          {tab==='campaigns' && <Campaigns campaigns={campaigns} activeOp={op} logs={logs} onDeploy={deployToCampaign} onUndeploy={undeploy} onClaimReinforcement={claimReinforcement} />}
          {tab==='log' && <LogActivity deployedCampaign={deployedCampaignTop} activeOp={op} logs={logs} addLogs={addLogs} campaigns={campaigns} />}
          {tab==='myprotocols' && <MyProtocols op={op} onSave={saveCustomProtocol} onDelete={deleteCustomProtocol} />}
          {tab==='habits' && <Habits op={op} logs={logs} onAddHabit={addHabit} onToggleArchive={toggleHabitArchive} onCheckin={logHabitCheckin} />}
          {tab==='squad' && <SquadTab activeOp={op} operators={operators} squads={squads} logs={logs} campaigns={campaigns}
            onCreate={createSquad} onJoin={joinSquad} onLeave={leaveSquad} onPromote={promoteOfficer} onDemote={demoteOfficer}
            onRemoveMember={removeMember} onRename={renameSquad} onDisband={disbandSquad} />}
          {tab==='dossier' && <Dossier op={dossierOp} operators={operators} campaigns={campaigns} logs={logs} squads={squads} onUpdateOperator={updateOperator} />}
          {tab==='roster' && <Roster operators={operators} campaigns={campaigns} logs={logs} onView={(id)=>{setViewDossierId(id); setTab('dossier');}} />}
          {tab==='codex' && <Codex entries={codexEntries} isAdmin={op.isAdmin} onUpdate={updateCodex} />}
          {tab==='comms' && <Comms chat={chat} operators={operators} activeOp={op} onSend={sendChat} />}
          {tab==='aar' && <AARLog operators={operators} campaigns={campaigns} logs={logs} />}
          {tab==='admin' && op.isAdmin && <AdminPanel operators={operators} campaigns={campaigns} onUpdateOperators={updateOperators} onUpdateCampaigns={updateCampaigns} />}
        </div>
      </div>

      {tab !== 'comms' && <MiniChat chat={chat} activeOp={op} onGoComms={()=>setTab('comms')} />}

      {showReset && (
        <div className="modal-overlay" onClick={() => setShowReset(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="disp" style={{fontSize:16,marginBottom:10}}>Reset all test data?</div>
            <div className="dim" style={{fontSize:13,marginBottom:18}}>Clears logs, chat, and Campaigns from the database. Operator accounts, habits, and custom Protocols are kept. Cannot be undone.</div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="ghost" onClick={() => setShowReset(false)}>Cancel</button>
              <button className="danger" onClick={resetAll}>Wipe & Reset</button>
            </div>
          </div>
        </div>
      )}

      {rankUpModal && (
        <div className="modal-overlay" onClick={()=>setRankUpModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{textAlign:'center',borderColor:'var(--amber)'}}>
            <div className="dim mono" style={{fontSize:10,marginBottom:10,letterSpacing:'0.1em'}}>PRIORITY TRANSMISSION — RANK ADVANCEMENT</div>
            <div className="disp amber" style={{fontSize:26,marginBottom:14}}>{rankUpModal}</div>
            <div style={{fontSize:13,lineHeight:1.7,marginBottom:20}}>{RANK_UP_LINES[rankUpModal]}</div>
            <button className="primary" style={{width:'100%'}} onClick={()=>setRankUpModal(null)}>Acknowledge</button>
          </div>
        </div>
      )}
    </div>
  );
}
