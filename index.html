<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANGUARD // PERSONNEL TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0B0E14;
    --panel:#131822;
    --panel-alt:#1A2130;
    --amber:#FFB238;
    --amber-dim:#C98A2A;
    --threat:#E4572E;
    --text:#E8E6DD;
    --text-dim:#8A93A6;
    --success:#6FCF97;
    --border:#2A3345;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--void);color:var(--text);
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    min-height:100vh;position:relative;overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;z-index:9999;
  }
  .disp{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .dim{color:var(--text-dim);}
  .amber{color:var(--amber);}
  .threat{color:var(--threat);}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--panel);flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse 2.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .brand-title{font-size:15px;font-weight:600;letter-spacing:0.08em;}
  .brand-sub{font-size:10px;color:var(--text-dim);letter-spacing:0.12em;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .who{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;}

  select{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;border-radius:2px;letter-spacing:0.03em;}
  button{cursor:pointer;border:1px solid var(--amber-dim);background:transparent;color:var(--amber);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;padding:9px 14px;border-radius:2px;transition:all .15s;text-transform:uppercase;}
  button:hover{background:rgba(255,178,56,0.1);}
  button.primary{background:var(--amber);color:#1a1206;border-color:var(--amber);font-weight:600;}
  button.primary:hover{background:#ffc35e;}
  button.ghost{border-color:var(--border);color:var(--text-dim);}
  button.ghost:hover{color:var(--text);border-color:var(--text-dim);}
  button.danger{border-color:var(--threat);color:var(--threat);}
  button.small{padding:5px 9px;font-size:10px;}
  button:disabled{opacity:0.4;cursor:not-allowed;}

  .layout{display:flex;min-height:calc(100vh - 64px);}
  .nav{width:190px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel);padding:18px 0;}
  .nav-item{padding:12px 22px;font-size:12px;letter-spacing:0.08em;cursor:pointer;color:var(--text-dim);border-left:2px solid transparent;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;}
  .nav-item:hover{color:var(--text);}
  .nav-item.active{color:var(--amber);border-left-color:var(--amber);background:rgba(255,178,56,0.06);}
  .main{flex:1;padding:26px;max-width:1040px;}

  .bracket-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--amber-dim);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .bracket-label::before{content:"[";color:var(--border);}
  .bracket-label::after{content:"]";color:var(--border);}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:22px;margin-bottom:20px;}
  .panel-title{font-size:22px;font-weight:600;margin-bottom:4px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:760px){.grid2{grid-template-columns:1fr;} .layout{flex-direction:column;} .nav{width:100%;display:flex;overflow-x:auto;padding:0;} .nav-item{border-left:none;border-bottom:2px solid transparent;white-space:nowrap;} .nav-item.active{border-left-color:transparent;border-bottom-color:var(--amber);}}

  .gauge-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .gauge{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
  .gauge-inner{width:112px;height:112px;border-radius:50%;background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .gauge-pct{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:var(--amber);}
  .gauge-label{font-size:9px;color:var(--text-dim);letter-spacing:0.1em;margin-top:2px;}

  .loc-row{margin-bottom:14px;}
  .loc-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
  .loc-name{font-weight:500;}
  .loc-pct{font-family:'IBM Plex Mono',monospace;color:var(--amber);}
  .bar-track{height:8px;background:var(--panel-alt);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transition:width .4s;}
  .loc-target{font-size:10px;color:var(--text-dim);margin-top:3px;font-family:'IBM Plex Mono',monospace;}

  .stat-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .stat-row:last-child{border-bottom:none;}
  .stat-val{font-family:'IBM Plex Mono',monospace;color:var(--amber);}
  .status-pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;letter-spacing:0.08em;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;border:1px solid currentColor;}
  .status-active{color:var(--success);}
  .status-alert{color:var(--amber);}
  .status-standby, .status-reserve, .status-deep{color:var(--threat);}
  .pill{display:inline-block;padding:3px 10px;border-radius:3px;font-size:11px;letter-spacing:0.05em;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;background:var(--panel-alt);border:1px solid var(--border);}
  .pill.rank{color:var(--amber);border-color:var(--amber-dim);}
  .pill.eligible{color:var(--success);border-color:var(--success);}
  .pill.not-eligible{color:var(--threat);border-color:var(--threat);}

  .sub-bars{margin-top:12px;}
  .sub-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:11px;}
  .sub-bar-label{width:130px;color:var(--text-dim);flex-shrink:0;}
  .sub-bar-track{flex:1;height:5px;background:var(--panel-alt);border-radius:2px;overflow:hidden;}
  .sub-bar-fill{height:100%;background:var(--amber-dim);}
  .sub-bar-val{width:34px;text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);}

  label{display:block;font-size:11px;letter-spacing:0.05em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
  .field{margin-bottom:16px;}
  input[type=number], input[type=text], input[type=password], textarea{
    width:100%;background:var(--panel-alt);color:var(--text);border:1px solid var(--border);
    padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:14px;border-radius:2px;
  }
  .radio-group{display:flex;gap:10px;flex-wrap:wrap;}
  .radio-opt{flex:1;min-width:140px;border:1px solid var(--border);padding:10px 12px;border-radius:2px;cursor:pointer;font-size:12px;text-align:center;color:var(--text-dim);}
  .radio-opt.sel{border-color:var(--amber);color:var(--amber);background:rgba(255,178,56,0.07);}
  .loc-pick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  @media(max-width:600px){.loc-pick{grid-template-columns:1fr;}}
  .loc-opt{border:1px solid var(--border);padding:10px;border-radius:2px;cursor:pointer;font-size:11px;}
  .loc-opt.sel{border-color:var(--amber);background:rgba(255,178,56,0.07);}
  .loc-opt-name{font-weight:600;margin-bottom:2px;}
  .loc-opt-obj{color:var(--text-dim);font-size:10px;}

  .feedback{margin-top:16px;padding:14px 16px;border-left:3px solid var(--amber);background:var(--panel-alt);font-size:13px;line-height:1.5;border-radius:2px;}
  .feedback.cap{border-left-color:var(--threat);}
  .feedback.win{border-left-color:var(--success);}

  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-weight:500;padding:8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.05em;font-size:10px;}
  td{padding:9px 8px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;}
  tr:last-child td{border-bottom:none;}
  tr.clickable{cursor:pointer;}
  tr.clickable:hover{background:var(--panel-alt);}

  .empty{text-align:center;padding:40px 20px;color:var(--text-dim);}
  .empty-title{font-size:14px;margin-bottom:6px;color:var(--text);}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:24px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;}

  .info-note{font-size:11px;color:var(--text-dim);line-height:1.6;margin-top:10px;padding:10px 12px;background:var(--panel-alt);border-radius:2px;}
  .toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px;}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{max-width:480px;width:100%;}
  .login-title{font-size:26px;text-align:center;margin-bottom:6px;}
  .login-sub{text-align:center;color:var(--text-dim);font-size:12px;margin-bottom:30px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.08em;}
  .roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  @media(max-width:480px){.roster-grid{grid-template-columns:1fr;}}
  .roster-card{border:1px solid var(--border);border-radius:3px;padding:16px;cursor:pointer;text-align:center;background:var(--panel);}
  .roster-card:hover{border-color:var(--amber-dim);}
  .avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:#1a1206;}
  .roster-name{font-weight:600;font-size:13px;letter-spacing:0.04em;}
  .roster-id{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;}

  .swatch-row{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:var(--text);}

  .exercise-pending{border:1px solid var(--border);border-radius:2px;padding:10px 12px;margin-bottom:8px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .set-row{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
  .set-row input{flex:1;}
  .set-row span{width:16px;text-align:center;color:var(--text-dim);font-size:11px;}

  .dossier-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:16px;}
  .dossier-avatar{width:64px;height:64px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:26px;font-weight:600;color:#1a1206;flex-shrink:0;}
  .field-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center;}
  .field-row:last-child{border-bottom:none;}
  .field-label{color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;}

  .chat-scroll{max-height:480px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-right:4px;}
  .chat-msg{padding:10px 14px;border-radius:2px;font-size:13px;max-width:80%;}
  .chat-msg.mine{align-self:flex-end;background:rgba(255,178,56,0.1);border:1px solid var(--amber-dim);}
  .chat-msg.theirs{align-self:flex-start;background:var(--panel-alt);border:1px solid var(--border);}
  .chat-msg.command{align-self:center;max-width:90%;background:rgba(255,178,56,0.08);border:1px solid var(--amber);}
  .chat-meta{font-size:10px;color:var(--text-dim);margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}
  .chat-input-row{display:flex;gap:8px;}
  .chat-input-row input{flex:1;}
  .campaign-card{border:1px solid var(--border);border-radius:3px;padding:16px;margin-bottom:14px;}
  .campaign-card.deployed{border-color:var(--amber);}
  .status-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.05em;}
  .status-tag.recruiting{color:var(--success);border:1px solid var(--success);}
  .status-tag.active{color:var(--amber);border:1px solid var(--amber);}
  .status-tag.success{color:var(--success);border:1px solid var(--success);background:rgba(111,207,151,0.1);}
  .status-tag.failed{color:var(--threat);border:1px solid var(--threat);}
</style>
</head>

function todayStr(d) { d = d || new Date(); return d.toISOString().slice(0, 10); }
function daysBetween(a, b) { return Math.floor((new Date(b) - new Date(a)) / 86400000); }
function findLocationForCategory(camp, category) {
  if (!camp) return null;
  return camp.locations.find(l => l.category === category) || null;
}
function locationTarget(camp, loc) {
  if (camp.lockedTargets && camp.lockedTargets[loc.id] !== undefined) return camp.lockedTargets[loc.id];
  if (loc.manualTarget) return loc.manualTarget;
  const rate = CAMPAIGN_BASE_RATES[loc.category] || CAMPAIGN_BASE_RATES.generic;
  const weeks = camp.durationDays / 7;
  const count = Math.max(1, camp.deployedOperatorIds.length);
  return Math.round(rate * weeks * count);
}
function campaignPhase(camp) {
  if (camp.resolved) return camp.resolved; // 'success' | 'failed'
  if (!camp.lockedAt) return 'recruiting';
  return 'active';
}

async function loadShared(key, fallback) {
  try { const res = await window.storage.get(key, true); return res ? JSON.parse(res.value) : fallback; }
  catch (e) { return fallback; }
}
async function saveShared(key, value) {
  try { await window.storage.set(key, JSON.stringify(value), true); }
  catch (e) { console.error('storage save failed', e); }
}

function computeLocationProgress(camp, logs) {
  return camp.locations.map(loc => {
    const target = locationTarget(camp, loc);
    const relevant = logs.filter(l => l.type === 'campaign' && l.campaignId === camp.id && l.locationId === loc.id);
    const groups = {};
    relevant.forEach(l => { const key = l.operatorId + '_' + l.date; (groups[key] = groups[key] || []).push(l); });
    let total = 0;
    Object.values(groups).forEach(entries => {
      entries.sort((a,b) => a.timestamp - b.timestamp);
      entries.forEach((e, idx) => { total += idx === 0 ? e.amount : e.amount * 0.5; });
    });
    const pct = target > 0 ? Math.min(100, (total / target) * 100) : 0;
    return Object.assign({}, loc, { total: Math.round(total * 10) / 10, target: target, pct: pct });
  });
}
function computePlanetControl(locProgress) {
  if (locProgress.length === 0) return 0;
  return locProgress.reduce((s, l) => s + l.pct, 0) / locProgress.length;
}

function computeBaselineImprovement(operator) {
  if (!operator.baseline || !operator.previousBaseline) return null;
  const metrics = ['pushups','pullups','squats','plankSeconds'];
  const changes = [];
  metrics.forEach(m => {
    const prev = operator.previousBaseline[m], cur = operator.baseline[m];
    if (prev > 0 && cur !== undefined) changes.push(((cur - prev) / prev) * 100);
  });
  if (changes.length === 0) return null;
  const avgChange = changes.reduce((a,b)=>a+b,0) / changes.length;
  const score = Math.max(0, Math.min(100, 50 + avgChange * 5));
  return { score: Math.round(score), avgChange: Math.round(avgChange*10)/10 };
}

function computeORS(operatorId, operator, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  const firstLogDate = opLogs.length ? opLogs.reduce((min,l) => l.date < min ? l.date : min, opLogs[0].date) : todayStr();
  const windowDays = Math.min(30, Math.max(1, daysBetween(firstLogDate, todayStr()) + 1));
  const uniqueDaysWithLog = new Set(opLogs.map(l => l.date)).size;
  const protocolSessionDays = new Set(opLogs.filter(l => l.type === 'protocol').map(l => l.date)).size;
  const campaignLogs = opLogs.filter(l => l.type === 'campaign');
  const uniqueCampaignDays = new Set(campaignLogs.map(l => l.date)).size;
  const scheduledSessions = (operator.weeklyTarget / 7) * windowDays;
  const protocolCompletionRate = scheduledSessions > 0 ? Math.min(100, (protocolSessionDays / scheduledSessions) * 100) : 0;
  const aarSubmissionRate = Math.min(100, (uniqueDaysWithLog / windowDays) * 100);
  const campaignActiveDayRate = Math.min(100, (uniqueCampaignDays / windowDays) * 100);
  const weights = { physical: 0.30, discipline: 0.30, squad: 0.20 };
  const weightSum = weights.physical + weights.discipline + weights.squad;
  const norm = { physical: weights.physical/weightSum, discipline: weights.discipline/weightSum, squad: weights.squad/weightSum };
  const baselineImp = computeBaselineImprovement(operator);
  const physical = baselineImp ? (0.70*protocolCompletionRate + 0.30*baselineImp.score) : protocolCompletionRate;
  const discipline = aarSubmissionRate, squad = campaignActiveDayRate;
  const ors = Math.round(norm.physical*physical + norm.discipline*discipline + norm.squad*squad);
  return { ors: ors, physical: Math.round(physical), discipline: Math.round(discipline), squad: Math.round(squad), windowDays: windowDays, baselineImp: baselineImp };
}

function nonCampaignMCP(operatorId, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId && l.type === 'protocol');
  const protocolDays = new Set(opLogs.map(l => l.date)).size;
  return protocolDays * 10;
}
function computeMCP(operatorId, campaigns, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  const protocolDays = new Set(opLogs.filter(l=>l.type==='protocol').map(l=>l.date)).size;
  const campaignEntries = opLogs.filter(l=>l.type==='campaign').length;
  let mcp = protocolDays*10 + campaignEntries*5;
  campaigns.forEach(camp => {
    if (camp.resolved === 'success' && opLogs.some(l => l.type==='campaign' && l.campaignId===camp.id)) mcp += 50;
  });
  return mcp;
}
function computeReadinessStatus(operatorId, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  if (opLogs.length === 0) return { label: 'Active', days: 0, cls: 'status-active' };
  const lastDate = opLogs.reduce((max,l) => l.date > max ? l.date : max, opLogs[0].date);
  const inactiveDays = daysBetween(lastDate, todayStr());
  if (inactiveDays <= 7) return { label: 'Active', days: inactiveDays, cls: 'status-active' };
  if (inactiveDays <= 14) return { label: 'Alert', days: inactiveDays, cls: 'status-alert' };
  if (inactiveDays <= 30) return { label: 'Standby', days: inactiveDays, cls: 'status-standby' };
  if (inactiveDays <= 60) return { label: 'Reserve', days: inactiveDays, cls: 'status-reserve' };
  return { label: 'Deep Reserve', days: inactiveDays, cls: 'status-deep' };
}
function computeRank(ors, deployedCampaign, operatorId, logs, status) {
  let activeDayRate = 0;
  if (deployedCampaign) {
    const campaignDaysElapsed = Math.max(1, daysBetween(deployedCampaign.startDate, todayStr()) + 1);
    const opCampaignLogs = logs.filter(l => l.operatorId === operatorId && l.type === 'campaign' && l.campaignId === deployedCampaign.id);
    const uniqueCampaignDays = new Set(opCampaignLogs.map(l => l.date)).size;
    activeDayRate = (uniqueCampaignDays / campaignDaysElapsed) * 100;
  }
  if (ors >= 90 && status.label === 'Active') return 'Vanguard';
  if (ors >= 75 && status.label === 'Active') return 'Specialist';
  if (ors >= 65 && status.label === 'Active') return 'Senior Operator';
  if (ors >= 50 && activeDayRate >= 50 && status.label === 'Active') return 'Operator';
  return 'Recruit';
}
function nextRankInfo(currentRank, ors, status) {
  const idx = RANK_ORDER.indexOf(currentRank);
  if (idx === -1 || idx === RANK_ORDER.length-1) return null;
  const next = RANK_ORDER[idx+1];
  const threshold = RANK_THRESHOLDS[next];
  const eligible = ors >= threshold && status.label === 'Active';
  return { next: next, threshold: threshold, eligible: eligible };
}

function App() {
  const [loaded, setLoaded] = useState(false);

  const [chat, setChat] = useState([]);
  const [activeOpId, setActiveOpId] = useState(null);
  const [tab, setTab] = useState('command');
  const [showReset, setShowReset] = useState(false);
  const [viewDossierId, setViewDossierId] = useState(null);

  useEffect(() => {
    (async () => {
      const ops = await loadShared('vanguard-operators', []);
      let camps = await loadShared('vanguard-campaigns', null);
      if (!camps) {
        const legacy = await loadShared('vanguard-campaign', null);
        if (legacy) {
          camps = [Object.assign({}, DEFAULT_CAMPAIGN_SEED, {
            startDate: legacy.startDate, deployedOperatorIds: ops.map(o=>o.id),
          })];
        } else {
          camps = [Object.assign({}, DEFAULT_CAMPAIGN_SEED, {startDate: todayStr()})];
        }
        await saveShared('vanguard-campaigns', camps);
      }
      const lg = await loadShared('vanguard-logs', []);
      const ch = await loadShared('vanguard-chat', []);
      // auto-lock join windows / resolve campaigns that have crossed their dates
      let changed = false;
      camps = camps.map(c => {
        let cc = c;
        if (!cc.lockedAt && daysBetween(cc.startDate, todayStr()) >= cc.joinWindowDays) {
          const count = Math.max(1, cc.deployedOperatorIds.length);
          const targets = {};
          cc.locations.forEach(loc => { targets[loc.id] = locationTarget(cc, loc); });
          cc = Object.assign({}, cc, { lockedAt: todayStr(), lockedTargets: targets, lockedDeployedCount: count });
          changed = true;
        }
        if (!cc.resolved && cc.lockedAt) {
          const locProg = computeLocationProgress(cc, lg);
          const pct = computePlanetControl(locProg);
          if (pct >= 100) { cc = Object.assign({}, cc, {resolved:'success'}); changed = true; }
          else if (daysBetween(cc.startDate, todayStr()) >= cc.durationDays) { cc = Object.assign({}, cc, {resolved:'failed'}); changed = true; }
        }
        return cc;
      });
      if (changed) await saveShared('vanguard-campaigns', camps);
      setOperators(ops); setCampaigns(camps); setLogs(lg); setChat(ch); setLoaded(true);
    })();
  }, []);

  // poll chat for near-live updates
  useEffect(() => {
    if (!loaded) return;
    const iv = setInterval(async () => {
      const ch = await loadShared('vanguard-chat', []);
      setChat(ch);
    }, 4000);
    return () => clearInterval(iv);
  }, [loaded]);

  async function addLogs(entries) {
    const newLogs = logs.concat(entries);
    setLogs(newLogs);
    await saveShared('vanguard-logs', newLogs);
  }
  async function enrollOperator(op) {
    const newOps = operators.concat([op]);
    setOperators(newOps);
    await saveShared('vanguard-operators', newOps);
    setActiveOpId(op.id);
  }
  async function updateOperator(updatedOp) {
    const newOps = operators.map(o => o.id === updatedOp.id ? updatedOp : o);
    setOperators(newOps);
    await saveShared('vanguard-operators', newOps);
  }
  async function updateOperators(newOps) {
    setOperators(newOps);
    await saveShared('vanguard-operators', newOps);
  }
  async function updateCampaigns(newCamps) {
    setCampaigns(newCamps);
    await saveShared('vanguard-campaigns', newCamps);
  }
  async function sendChat(msg) {
    const newChat = chat.concat([msg]);
    setChat(newChat);
    await saveShared('vanguard-chat', newChat);
  }
  async function resetAll() {
    const camps = [Object.assign({}, DEFAULT_CAMPAIGN_SEED, {startDate: todayStr()})];
    setCampaigns(camps); setLogs([]); setChat([]);
    await saveShared('vanguard-campaigns', camps);
    await saveShared('vanguard-logs', []);
    await saveShared('vanguard-chat', []);
    const clearedOps = operators.map(o => Object.assign({}, o, {currentDeploymentId:null, reinforcementDropsAvailable:0, mcpAtLastReinforcement:0}));
    setOperators(clearedOps);
    await saveShared('vanguard-operators', clearedOps);
    setShowReset(false);
  }

  // deployment actions, shared across tabs
  async function deployToCampaign(op, camp) {
    if (op.currentDeploymentId) return;
    const phase = campaignPhase(camp);
    let newCamps = campaigns;
    if (phase === 'recruiting') {
      newCamps = campaigns.map(c => c.id===camp.id ? Object.assign({}, c, {deployedOperatorIds: c.deployedOperatorIds.concat([op.id])}) : c);
    } else if (phase === 'active') {
      const capMax = Math.floor(0.2 * camp.lockedDeployedCount);
      if (op.reinforcementDropsAvailable < 1 || camp.reinforcementsUsed >= capMax) return;
      newCamps = campaigns.map(c => c.id===camp.id ? Object.assign({}, c, {
        deployedOperatorIds: c.deployedOperatorIds.concat([op.id]), reinforcementsUsed: c.reinforcementsUsed + 1
      }) : c);
      await updateOperator(Object.assign({}, op, {currentDeploymentId: camp.id, reinforcementDropsAvailable: op.reinforcementDropsAvailable - 1}));
      setCampaigns(newCamps); await saveShared('vanguard-campaigns', newCamps);
      return;
    } else { return; }
    await updateOperator(Object.assign({}, op, {currentDeploymentId: camp.id}));
    setCampaigns(newCamps); await saveShared('vanguard-campaigns', newCamps);
  }
  async function undeploy(op) {
    await updateOperator(Object.assign({}, op, {currentDeploymentId: null}));
  }
  async function claimReinforcement(op) {
    await updateOperator(Object.assign({}, op, {reinforcementDropsAvailable: 1, mcpAtLastReinforcement: nonCampaignMCP(op.id, logs)}));
  }

  if (!loaded) return <div style={{padding:40,fontFamily:'IBM Plex Mono, monospace',color:'#8A93A6'}}>ESTABLISHING UPLINK...</div>;

  if (!activeOpId) {
    return <Login operators={operators} onLogin={setActiveOpId} onEnroll={enrollOperator} />;
  }

  const op = operators.find(o => o.id === activeOpId);
  if (!op) { setActiveOpId(null); return null; }

  if (!op.onboarded) {
    return <Onboarding op={op} onComplete={(updatedOp)=>{ updateOperator(updatedOp); }} />;
  }

  const dossierOp = viewDossierId ? operators.find(o=>o.id===viewDossierId) : op;
  const noAdminExists = !operators.some(o => o.isAdmin);
  const deployedCampaign = op.currentDeploymentId ? campaigns.find(c => c.id === op.currentDeploymentId) : null;

  return (
    <div>
      <div className="topbar">
        <div className="brand" onClick={()=>{setTab('command'); setViewDossierId(null);}}>
          <div className="brand-dot"></div>
          <div>
            <div className="disp brand-title">Vanguard // Personnel Terminal</div>
            <div className="brand-sub">United Earth Alliance — Alpha Cell</div>
          </div>
        </div>
        <div className="topbar-right">
          <div className="who"><Avatar op={op} size={28} /> {op.callsign}</div>
          <button className="ghost small" onClick={()=>setActiveOpId(null)}>Log Out</button>
          <button className="ghost small" onClick={() => setShowReset(true)}>Reset Test Data</button>
        </div>
      </div>

      {noAdminExists && (
        <div style={{background:'var(--panel-alt)',borderBottom:'1px solid var(--amber-dim)',padding:'10px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div style={{fontSize:12}}><span className="amber">No Command assigned.</span> <span className="dim">The roster has no admin yet — someone needs to claim it to manage Campaign settings and roster.</span></div>
          <button className="primary small" onClick={()=>updateOperator(Object.assign({}, op, {isAdmin: true}))}>Claim Command ({op.callsign})</button>
        </div>
      )}

      <div className="layout">
        <div className="nav">
          {(op.isAdmin ? ['command','campaigns','log','dossier','roster','comms','aar','admin'] : ['command','campaigns','log','dossier','roster','comms','aar']).map(t => (
            <div key={t} className={"nav-item"+(tab===t?" active":"")} onClick={() => {setTab(t); if(t==='dossier') setViewDossierId(op.id);}}>
              {t==='command' && 'Command Center'}
              {t==='campaigns' && 'Campaigns'}
              {t==='log' && 'Log Activity'}
              {t==='dossier' && 'My Dossier'}
              {t==='roster' && 'Roster'}
              {t==='comms' && 'Comms'}
              {t==='aar' && 'AAR Log'}
              {t==='admin' && 'Admin Panel'}
            </div>
          ))}
        </div>
        <div className="main">
          {tab==='command' && <CommandCenter operators={operators} campaigns={campaigns} logs={logs} activeOp={op} deployedCampaign={deployedCampaign} onGoCampaigns={()=>setTab('campaigns')} />}
          {tab==='campaigns' && <Campaigns campaigns={campaigns} activeOp={op} logs={logs} onDeploy={deployToCampaign} onUndeploy={undeploy} onClaimReinforcement={claimReinforcement} />}
          {tab==='log' && <LogActivity deployedCampaign={deployedCampaign} activeOp={op} logs={logs} addLogs={addLogs} />}
          {tab==='dossier' && <Dossier op={dossierOp} operators={operators} campaigns={campaigns} logs={logs} onUpdateOperator={updateOperator} />}
          {tab==='roster' && <Roster operators={operators} campaigns={campaigns} logs={logs} onView={(id)=>{setViewDossierId(id); setTab('dossier');}} />}
          {tab==='comms' && <Comms chat={chat} operators={operators} activeOp={op} onSend={sendChat} />}
          {tab==='aar' && <AARLog operators={operators} campaigns={campaigns} logs={logs} />}
          {tab==='admin' && op.isAdmin && <AdminPanel operators={operators} campaigns={campaigns} onUpdateOperators={updateOperators} onUpdateCampaigns={updateCampaigns} />}
        </div>
      </div>

      {showReset && (
        <div className="modal-overlay" onClick={() => setShowReset(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="disp" style={{fontSize:16,marginBottom:10}}>Reset all test data?</div>
            <div className="dim" style={{fontSize:13,marginBottom:18}}>Clears every logged AAR, all chat messages, and resets every Campaign. Operators are kept, but their deployments and reinforcement status reset. Cannot be undone.</div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="ghost" onClick={() => setShowReset(false)}>Cancel</button>
              <button className="danger" onClick={resetAll}>Wipe & Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CommandCenter({ operators, campaigns, logs, activeOp, deployedCampaign, onGoCampaigns }) {
  const orsData = computeORS(activeOp.id, activeOp, logs);
  const status = computeReadinessStatus(activeOp.id, logs);
  const rank = computeRank(orsData.ors, deployedCampaign, activeOp.id, logs, status);
  const locProgress = deployedCampaign ? computeLocationProgress(deployedCampaign, logs) : [];
  const planetPct = deployedCampaign ? computePlanetControl(locProgress) : 0;
  const daysLeft = deployedCampaign ? Math.max(0, deployedCampaign.durationDays - daysBetween(deployedCampaign.startDate, todayStr())) : 0;

  return (
    <div>
      <div className="panel">
        <div className="bracket-label">Command Briefing</div>
        <div style={{fontSize:12,lineHeight:1.8,color:'var(--text-dim)'}}>
          <span className="amber" style={{fontWeight:600}}>Helix Dynamics</span> and the United Earth Alliance built the Vanguard Initiative on one principle: prepared people create stronger communities. Somewhere in the <span className="amber">Hollow Reach</span> sector, the <span className="amber">Kharvax Swarm</span> holds ground it shouldn't. Every rep logged here pushes back. High Command set the quotas. You're the one actually doing the work.
        </div>
      </div>

      {deployedCampaign ? (
        <div className="panel">
          <div className="bracket-label">Your Deployment</div>
          <div className="disp panel-title">{deployedCampaign.name}</div>
          <div className="dim mono" style={{fontSize:12}}>Threat: {deployedCampaign.threat} · {deployedCampaign.sector} · {daysLeft} days remaining</div>
          <div style={{marginTop:18}} className="gauge-wrap">
            <Gauge pct={planetPct} />
            <div style={{flex:1,minWidth:220}}>
              {locProgress.map(loc => (
                <div key={loc.id} className="loc-row">
                  <div className="loc-head"><span className="loc-name">{loc.name}</span><span className="loc-pct mono">{Math.round(loc.pct)}%</span></div>
                  <div className="bar-track"><div className="bar-fill" style={{width: loc.pct+'%'}}></div></div>
                  <div className="loc-target">{loc.total} / {loc.target} {loc.unit}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      ) : (
        <div className="panel">
          <div className="bracket-label">Your Deployment</div>
          <div className="dim" style={{fontSize:13,marginBottom:12}}>Not currently deployed to any Campaign.</div>
          <button className="primary" onClick={onGoCampaigns}>View Campaigns</button>
        </div>
      )}

      <div className="grid2">
        <div className="panel">
          <div className="bracket-label">Operator Status — {activeOp.callsign}</div>
          <div className="stat-row"><span>Rank</span><span className="pill rank">{rank}</span></div>
          <div className="stat-row"><span>Readiness (ORS)</span><span className="stat-val">{orsData.ors} / 100</span></div>
          <div className="stat-row"><span>Status</span><span className={"status-pill "+status.cls}>{status.label}</span></div>
          <div className="sub-bars">
            <SubBar label="Physical Capability" val={orsData.physical} />
            <SubBar label="Mission Discipline" val={orsData.discipline} />
            <SubBar label="Squad Contribution" val={orsData.squad} />
          </div>
        </div>
        <div className="panel">
          <div className="bracket-label">Quick Reference</div>
          <div className="dim" style={{fontSize:12,lineHeight:1.8}}>
            You can only be deployed to one Campaign at a time. First log per Location per day counts 1:1; additional logs same day count at 50%.<br/><br/>
            Logging a Protocol exercise that matches your deployed Campaign's Location objectives auto-credits that Location.
          </div>
        </div>
      </div>
    </div>
  );
}

function Campaigns({ campaigns, activeOp, logs, onDeploy, onUndeploy, onClaimReinforcement }) {
  const deployedId = activeOp.currentDeploymentId;
  const nonCampMCP = nonCampaignMCP(activeOp.id, logs);
  const mcpToNextDrop = Math.max(0, 200 - (nonCampMCP - activeOp.mcpAtLastReinforcement));
  const eligibleForDrop = activeOp.reinforcementDropsAvailable < 1 && mcpToNextDrop <= 0;

  return (
    <div>
      {activeOp.reinforcementDropsAvailable > 0 && (
        <div className="panel" style={{borderColor:'var(--amber)'}}>
          <div className="bracket-label">Reinforcement Drop Available</div>
          <div style={{fontSize:12,color:'var(--text-dim)'}}>You've earned a late-entry pass. Use it to deploy to a Campaign whose Join Window has already closed.</div>
        </div>
      )}
      {activeOp.reinforcementDropsAvailable === 0 && (
        <div className="panel">
          <div className="bracket-label">Reinforcement Drop Progress</div>
          <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:8}}>Earned by accumulating 200 MCP from non-Campaign sources (Protocol sessions). {mcpToNextDrop > 0 ? mcpToNextDrop+' MCP to go.' : 'Ready to claim!'}</div>
          {eligibleForDrop && <button className="primary small" onClick={()=>onClaimReinforcement(activeOp)}>Claim Reinforcement Drop</button>}
        </div>
      )}

      {campaigns.map(camp => {
        const phase = campaignPhase(camp);
        const locProg = computeLocationProgress(camp, logs);
        const planetPct = computePlanetControl(locProg);
        const isDeployed = deployedId === camp.id;
        const daysLeft = Math.max(0, camp.durationDays - daysBetween(camp.startDate, todayStr()));
        const joinWindowDaysLeft = Math.max(0, camp.joinWindowDays - daysBetween(camp.startDate, todayStr()));
        const capMax = Math.floor(0.2 * camp.lockedDeployedCount);
        const canDeployReinforcement = phase==='active' && activeOp.reinforcementDropsAvailable>0 && camp.reinforcementsUsed < capMax;

        return (
          <div key={camp.id} className={"campaign-card"+(isDeployed?' deployed':'')}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
              <div>
                <div className="disp" style={{fontSize:18}}>{camp.name}</div>
                <div className="dim mono" style={{fontSize:11}}>{camp.threat} · {camp.sector}</div>
              </div>
              <span className={"status-tag "+(phase==='recruiting'?'recruiting':phase==='active'?'active':phase)}>
                {phase==='recruiting' && `Recruiting (${joinWindowDaysLeft}d left)`}
                {phase==='active' && `Active (${daysLeft}d left)`}
                {phase==='success' && 'Victory'}
                {phase==='failed' && 'Contested'}
              </span>
            </div>
            <div style={{marginTop:12,fontSize:12}}>Control: <span className="amber mono">{Math.round(planetPct)}%</span> · Deployed: {camp.deployedOperatorIds.length}{camp.lockedAt ? ` (locked at ${camp.lockedDeployedCount})` : ''}</div>
            <div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>
              {isDeployed && <button className="ghost small" onClick={()=>onUndeploy(activeOp)}>Undeploy</button>}
              {!isDeployed && !deployedId && phase==='recruiting' && <button className="primary small" onClick={()=>onDeploy(activeOp, camp)}>Deploy</button>}
              {!isDeployed && !deployedId && phase==='active' && canDeployReinforcement && <button className="primary small" onClick={()=>onDeploy(activeOp, camp)}>Deploy (Reinforcement Drop)</button>}
              {!isDeployed && deployedId && deployedId !== camp.id && <span className="dim" style={{fontSize:11}}>Already deployed elsewhere</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function LogActivity({ deployedCampaign, activeOp, logs, addLogs }) {
  const [mode, setMode] = useState('structured');
  const [sessionId, setSessionId] = useState(PROTOCOL_SESSIONS[0].id);
  const [objSets, setObjSets] = useState({}); // objIndex -> [{reps,weight}]
  const [objVariant, setObjVariant] = useState({});
  const [feedback, setFeedback] = useState(null);

  const [protocolLabel, setProtocolLabel] = useState('Protocol Alpha');
  const [pending, setPending] = useState([]);
  const [exName, setExName] = useState(EXERCISES[0].name);
  const [variant, setVariant] = useState(EXERCISES[0].name);
  const [sets, setSets] = useState([{reps:'', weight:''}]);
  const [duration, setDuration] = useState('');

  const [locationId, setLocationId] = useState(null);
  const [amount, setAmount] = useState('');

  const session = PROTOCOL_SESSIONS.find(s => s.id === sessionId);

  function getObjSets(idx, obj) {
    if (objSets[idx]) return objSets[idx];
    return Array.from({length: obj.sets}, () => ({reps:'', weight:''}));
  }
  function updateObjSet(idx, setIdx, field, val) {
    const cur = getObjSets(idx, session.objectives[idx]).slice();
    cur[setIdx] = Object.assign({}, cur[setIdx], {[field]: val});
    setObjSets(Object.assign({}, objSets, {[idx]: cur}));
  }

  async function submitStructuredSession() {
    const entries = [];
    const now = Date.now();
    const autoNotes = [];
    session.objectives.forEach((obj, idx) => {
      const isTimeBased = obj.unit === 'seconds' || obj.unit === 'minutes';
      const setRows = getObjSets(idx, obj);
      const totalValue = setRows.reduce((s,r)=> s + (parseFloat(r.reps)||0), 0);
      if (totalValue <= 0) return;
      const variantUsed = objVariant[idx] || obj.name;
      const ts = now + idx*2;
      const logId = 'log_'+ts;
      entries.push({
        id: logId, operatorId: activeOp.id, type:'protocol', date: todayStr(), timestamp: ts,
        protocolLabel: session.protocol, exercise: obj.name, variant: variantUsed, category: obj.category,
        unit: obj.unit, sets: setRows.filter(r=>r.reps), totalValue: totalValue,
        detail: setRows.filter(r=>r.reps).map(r=>(r.reps||0)+(r.weight?'@'+r.weight+'lb':'')).join(', '),
      });
      if (deployedCampaign) {
        const loc = findLocationForCategory(deployedCampaign, obj.category);
        if (loc) {
          const alreadyToday = logs.filter(l => l.type==='campaign' && l.campaignId===deployedCampaign.id && l.operatorId===activeOp.id && l.locationId===loc.id && l.date===todayStr())
            .concat(entries.filter(e2 => e2.type==='campaign' && e2.locationId===loc.id));
          const isFirst = alreadyToday.length === 0;
          entries.push({
            id: logId+'_auto', operatorId: activeOp.id, type:'campaign', campaignId: deployedCampaign.id, locationId: loc.id,
            amount: totalValue, date: todayStr(), timestamp: ts+1, source:'protocol-auto', sourceExercise: obj.name,
          });
          autoNotes.push(obj.name+' ('+totalValue+' '+obj.unit+') auto-credited to '+loc.name+(isFirst?'':' at half value (soft cap)'));
        }
      }
    });
    if (entries.length === 0) { setFeedback({cap:false,text:'Log at least one set before submitting.'}); return; }
    await addLogs(entries);
    setFeedback({ win:true, text: session.name+' logged, '+activeOp.callsign+'.' + (autoNotes.length ? ' '+autoNotes.join('. ')+'.' : (deployedCampaign ? ' No matching Location for this session\u2019s exercises.' : ' Not currently deployed \u2014 no Campaign credit applied.')) });
    setObjSets({}); setObjVariant({});
  }

  const exObj = EXERCISES.find(e => e.name === exName);
  const isTimeBased = exObj.unit === 'minutes' || exObj.unit === 'seconds';
  function updateSet(i, field, val) { const ns = sets.slice(); ns[i] = Object.assign({}, ns[i], {[field]: val}); setSets(ns); }
  function addSetRow() { setSets(sets.concat([{reps:'', weight:''}])); }
  function removeSetRow(i) { setSets(sets.filter((_,idx)=>idx!==i)); }
  function addExerciseToPending() {
    let totalValue = 0, detail = '';
    if (isTimeBased) { totalValue = parseFloat(duration) || 0; detail = totalValue + ' ' + exObj.unit; }
    else { totalValue = sets.reduce((s,st) => s + (parseFloat(st.reps)||0), 0); detail = sets.map(st => (st.reps||0)+(st.weight?'@'+st.weight+'lb':'')).join(', '); }
    if (totalValue <= 0) return;
    setPending(pending.concat([{ exercise: exName, variant: variant, category: exObj.category, unit: exObj.unit, isTimeBased: isTimeBased, sets: isTimeBased ? [] : sets.filter(s=>s.reps), totalValue: totalValue, detail: detail }]));
    setSets([{reps:'',weight:''}]); setDuration('');
  }
  function removePending(i) { setPending(pending.filter((_,idx)=>idx!==i)); }

  async function submitFreeformSession() {
    if (pending.length === 0) return;
    const entries = []; const now = Date.now(); const autoNotes = [];
    pending.forEach((ex, i) => {
      const ts = now + i*2; const logId = 'log_'+ts;
      entries.push({ id: logId, operatorId: activeOp.id, type:'protocol', date: todayStr(), timestamp: ts, protocolLabel: protocolLabel, exercise: ex.exercise, variant: ex.variant, category: ex.category, unit: ex.unit, sets: ex.sets, totalValue: ex.totalValue, detail: ex.detail });
      if (deployedCampaign) {
        const loc = findLocationForCategory(deployedCampaign, ex.category);
        if (loc) {
          const alreadyToday = logs.filter(l => l.type==='campaign' && l.campaignId===deployedCampaign.id && l.operatorId===activeOp.id && l.locationId===loc.id && l.date===todayStr())
            .concat(entries.filter(e2 => e2.type==='campaign' && e2.locationId===loc.id));
          const isFirst = alreadyToday.length === 0;
          entries.push({ id: logId+'_auto', operatorId: activeOp.id, type:'campaign', campaignId: deployedCampaign.id, locationId: loc.id, amount: ex.totalValue, date: todayStr(), timestamp: ts+1, source:'protocol-auto', sourceExercise: ex.exercise });
          autoNotes.push(ex.exercise+' ('+ex.totalValue+' '+ex.unit+') auto-credited to '+loc.name+(isFirst?'':' at half value (soft cap)'));
        }
      }
    });
    await addLogs(entries);
    setFeedback({ win: true, text: 'Session logged, '+activeOp.callsign+'. '+pending.length+' exercise(s) recorded.' + (autoNotes.length ? ' ' + autoNotes.join('. ') + '.' : (deployedCampaign ? ' No matching Location.' : ' Not currently deployed \u2014 no Campaign credit applied.')) });
    setPending([]);
  }

  function submitManualCampaign() {
    if (!deployedCampaign) { setFeedback({cap:false, text:'Deploy to a Campaign first \u2014 see the Campaigns tab.'}); return; }
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) { setFeedback({cap:false, text:'Enter a valid amount before submitting, Operator.'}); return; }
    const locId = locationId || deployedCampaign.locations[0].id;
    const now = Date.now();
    const entry = { id:'log_'+now, operatorId: activeOp.id, type:'campaign', campaignId: deployedCampaign.id, locationId: locId, amount: amt, date: todayStr(), timestamp: now };
    const todaysAtLoc = logs.filter(l => l.type==='campaign' && l.campaignId===deployedCampaign.id && l.operatorId===activeOp.id && l.locationId===locId && l.date===todayStr());
    addLogs([entry]);
    if (todaysAtLoc.length >= 1) {
      setFeedback({cap:true, text:"Contribution logged, Operator. Today's push is in \u2014 Command's got it. Anything more today still counts, just at half value. That's not a penalty. That's the mission reminding you recovery is part of it too. The Swarm doesn't stop. You're allowed to."});
    } else {
      setFeedback({cap:false, text:'Contribution logged, Operator. Command sees it.'});
    }
    setAmount('');
  }

  const campLoc = deployedCampaign ? deployedCampaign.locations.find(l => l.id === (locationId||deployedCampaign.locations[0].id)) : null;

  return (
    <div className="panel">
      <div className="bracket-label">Log Activity — {activeOp.callsign}</div>
      <div className="field">
        <label>Activity Type</label>
        <div className="radio-group">
          <div className={"radio-opt"+(mode==='structured'?' sel':'')} onClick={()=>{setMode('structured'); setFeedback(null);}}>Structured Session</div>
          <div className={"radio-opt"+(mode==='freeform'?' sel':'')} onClick={()=>{setMode('freeform'); setFeedback(null);}}>Freeform Exercise</div>
          <div className={"radio-opt"+(mode==='campaign'?' sel':'')} onClick={()=>{setMode('campaign'); setFeedback(null);}}>Campaign Contribution (manual)</div>
        </div>
      </div>

      {mode === 'structured' && (
        <div>
          <div className="field">
            <label>Session</label>
            <select style={{width:'100%'}} value={sessionId} onChange={e=>{setSessionId(e.target.value); setObjSets({}); setObjVariant({});}}>
              {PROTOCOL_SESSIONS.map(s => <option key={s.id} value={s.id}>{s.protocol} — {s.name}</option>)}
            </select>
          </div>
          {session.objectives.map((obj, idx) => {
            const isTB = obj.unit === 'seconds' || obj.unit === 'minutes';
            const rows = getObjSets(idx, obj);
            return (
              <div key={idx} style={{border:'1px solid var(--border)', borderRadius:2, padding:12, marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div><strong>{obj.name}</strong> <span className="dim" style={{fontSize:11}}>— {obj.sets}×{obj.repLow===obj.repHigh?obj.repLow:obj.repLow+'–'+obj.repHigh} {obj.unit}</span></div>
                  <select value={objVariant[idx]||obj.name} onChange={e=>setObjVariant(Object.assign({},objVariant,{[idx]:e.target.value}))} style={{fontSize:11}}>
                    <option value={obj.name}>{obj.name} (standard)</option>
                    {obj.alternatives.map(a => <option key={a} value={a}>{a}</option>)}
                  </select>
                </div>
                {rows.map((r,si) => (
                  <div className="set-row" key={si}>
                    <span>{si+1}</span>
                    <input type="number" placeholder={isTB?obj.unit:'Reps'} value={r.reps} onChange={e=>updateObjSet(idx,si,'reps',e.target.value)} />

  function chooseSpecialization(s) { if (onUpdateOperator) onUpdateOperator(Object.assign({}, op, {specialization: s})); setPickingSpec(false); }

            <div className="field-label" style={{marginBottom:4}}># Mission Discipline</div>

function RetestModal({ onClose, onSubmit }) {
  const [pushups, setPushups] = useState('');
  const [pullups, setPullups] = useState('');
  const [squats, setSquats] = useState('');
  const [plank, setPlank] = useState('');
  const [runMinutes, setRunMinutes] = useState('');
  function submit() {
    const pu = parseFloat(pushups)||0, pl = parseFloat(pullups)||0, sq = parseFloat(squats)||0, pk = parseFloat(plank)||0;
    let pts = 0;
    pts += pu>=41?4:pu>=26?3:pu>=11?2:pu>=1?1:0;
    pts += pl>=13?4:pl>=8?3:pl>=3?2:pl>=0?1:0;
    pts += pk>=180?4:pk>=120?3:pk>=60?2:pk>0?1:0;
    let tier = pts>=15?'Peak Tier':pts>=12?'Advanced Tier':pts>=8?'Development Tier':'Foundation Tier';
    onSubmit({ pushups: pu, pullups: pl, squats: sq, plankSeconds: pk, runMinutes: parseFloat(runMinutes)||0, score: pts, tier: tier, date: todayStr() });
  }
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="disp" style={{fontSize:18,marginBottom:16}}>Baseline Retest</div>
        <div className="field"><label>Max Push-Ups</label><input type="number" value={pushups} onChange={e=>setPushups(e.target.value)} /></div>
        <div className="field"><label>Max Pull-Ups</label><input type="number" value={pullups} onChange={e=>setPullups(e.target.value)} /></div>
        <div className="field"><label>Bodyweight Squats in 2 Minutes</label><input type="number" value={squats} onChange={e=>setSquats(e.target.value)} /></div>
        <div className="field"><label>Plank Hold (seconds)</label><input type="number" value={plank} onChange={e=>setPlank(e.target.value)} /></div>
        <div className="field"><label>1.5 Mile Run Time (minutes, optional)</label><input type="number" value={runMinutes} onChange={e=>setRunMinutes(e.target.value)} /></div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button className="ghost" onClick={onClose}>Cancel</button>
          <button className="primary" onClick={submit}>Submit Retest</button>
        </div>
      </div>
    </div>
  );
}

          {operators.map(op => {

function AARLog({ operators, campaigns, logs }) {
  const sorted = logs.slice().sort((a,b) => b.timestamp - a.timestamp);
  const opName = id => { const o = operators.find(o=>o.id===id); return o ? o.callsign : id; };
  const locName = (campId, locId) => { const c = campaigns.find(c=>c.id===campId); if(!c) return locId; const l = c.locations.find(l=>l.id===locId); return l ? l.name : locId; };

  if (sorted.length === 0) {
    return <div className="panel"><div className="empty"><div className="empty-title">No AARs filed yet.</div><div>Log your first Protocol session or Campaign contribution to see it here.</div></div></div>;
  }
  return (
    <div className="panel">
      <div className="bracket-label">After Action Reports — Full Log</div>
      <table>
        <thead><tr><th>Date</th><th>Operator</th><th>Type</th><th>Detail</th><th>Value</th></tr></thead>
        <tbody>
          {sorted.map(l => (
            <tr key={l.id}>
              <td>{l.date}</td>
              <td>{opName(l.operatorId)}</td>
              <td>{l.type === 'protocol' ? 'Protocol' : (l.source==='protocol-auto' ? 'Campaign (auto)' : 'Campaign')}</td>
              <td>{l.type === 'protocol' ? (l.variant+' — '+l.detail) : (locName(l.campaignId, l.locationId) + (l.sourceExercise ? (' (from '+l.sourceExercise+')') : ''))}</td>
              <td>{l.type === 'protocol' ? (l.totalValue+' '+l.unit) : l.amount}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Comms({ chat, operators, activeOp, onSend }) {
  const [text, setText] = useState('');
  const [asCommand, setAsCommand] = useState(false);
  const scrollRef = useRef(null);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [chat]);

  function send() {
    if (!text.trim()) return;
    onSend({ id:'chat_'+Date.now(), authorId: activeOp.id, authorName: activeOp.callsign, isCommand: asCommand && activeOp.isAdmin, text: text.trim(), timestamp: Date.now() });
    setText('');
  }

  return (
    <div className="panel">
      <div className="bracket-label">Comms — Alpha Cell</div>
      <div className="chat-scroll" ref={scrollRef}>
        {chat.length === 0 && <div className="empty"><div className="empty-title">No transmissions yet.</div></div>}
        {chat.map(m => (
          <div key={m.id} className={"chat-msg "+(m.isCommand?'command':(m.authorId===activeOp.id?'mine':'theirs'))}>
            <div className="chat-meta">{m.isCommand ? 'COMMAND TRANSMISSION' : m.authorName} · {new Date(m.timestamp).toLocaleString()}</div>
            <div>{m.text}</div>
          </div>
        ))}
      </div>
      <div className="chat-input-row">
        <input type="text" value={text} onChange={e=>setText(e.target.value)} placeholder="Message Alpha Cell..." onKeyDown={e=>{if(e.key==='Enter') send();}} />
        <button className="primary" onClick={send}>Send</button>
      </div>
      {activeOp.isAdmin && (
        <div style={{marginTop:10,display:'flex',alignItems:'center',gap:8}}>
          <input type="checkbox" checked={asCommand} onChange={e=>setAsCommand(e.target.checked)} style={{width:14,height:14}} />
          <label style={{marginBottom:0,textTransform:'none',fontSize:12}}>Post as Command Transmission</label>
        </div>
      )}

    </div>
  );
}

function AdminPanel({ operators, campaigns, onUpdateOperators, onUpdateCampaigns }) {
  const [editingId, setEditingId] = useState(campaigns[0] ? campaigns[0].id : null);
  const [creating, setCreating] = useState(false);
  const [savedMsg, setSavedMsg] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(null);
  const editing = campaigns.find(c => c.id === editingId);
  const [draft, setDraft] = useState(editing ? JSON.parse(JSON.stringify(editing)) : null);

  useEffect(() => { const c = campaigns.find(c=>c.id===editingId); setDraft(c ? JSON.parse(JSON.stringify(c)) : null); }, [editingId]);

  function updateLocField(idx, field, val) {
    const locs = draft.locations.slice();
    locs[idx] = Object.assign({}, locs[idx], { [field]: field==='manualTarget' ? (val?Number(val):null) : val });
    setDraft(Object.assign({}, draft, {locations: locs}));
  }
  function addLocation() {
    const locs = draft.locations.concat([{ id: 'loc_'+Date.now(), name: 'New Location', objective: 'Total reps', category: 'generic', unit: 'reps', manualTarget: null }]);
    setDraft(Object.assign({}, draft, {locations: locs}));
  }
  function removeLocation(idx) { setDraft(Object.assign({}, draft, {locations: draft.locations.filter((_,i)=>i!==idx)})); }
  async function saveCampaign() {
    const newCamps = campaigns.map(c => c.id === draft.id ? draft : c);
    await onUpdateCampaigns(newCamps);
    setSavedMsg('Saved.'); setTimeout(()=>setSavedMsg(''), 2000);
  }
  async function forceLockWindow() {
    const count = Math.max(1, draft.deployedOperatorIds.length);
    const targets = {};
    draft.locations.forEach(loc => { targets[loc.id] = locationTarget(draft, loc); });
    const updated = Object.assign({}, draft, {lockedAt: todayStr(), lockedTargets: targets, lockedDeployedCount: count});
    setDraft(updated);
    await onUpdateCampaigns(campaigns.map(c => c.id === updated.id ? updated : c));
  }
  async function forceResolve(result) {
    const updated = Object.assign({}, draft, {resolved: result});
    setDraft(updated);
    const clearedOps = operators.map(o => o.currentDeploymentId === updated.id ? Object.assign({}, o, {currentDeploymentId:null}) : o);
    await onUpdateOperators(clearedOps);
    await onUpdateCampaigns(campaigns.map(c => c.id === updated.id ? updated : c));
  }

  function updateOpField(id, field, val) {
    const newOps = operators.map(o => o.id === id ? Object.assign({}, o, {[field]: field==='weeklyTarget' ? Number(val) : val}) : o);
    onUpdateOperators(newOps);
  }
  function deleteOperator(id) { onUpdateOperators(operators.filter(o => o.id !== id)); setConfirmDelete(null); }

  return (
    <div>
      <div className="panel">
        <div className="bracket-label">Admin — Campaigns</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {campaigns.map(c => <button key={c.id} className={editingId===c.id?'primary small':'ghost small'} onClick={()=>{setEditingId(c.id); setCreating(false);}}>{c.name}</button>)}
          <button className="ghost small" onClick={()=>{setCreating(true); setEditingId(null); setDraft({id:'camp_'+Date.now(), name:'New Campaign', threat:'Unknown', sector:'Unassigned Sector', startDate: todayStr(), joinWindowDays:5, durationDays:28, locations:[], lockedAt:null, lockedTargets:null, lockedDeployedCount:0, deployedOperatorIds:[], reinforcementsUsed:0, resolved:null});}}>+ New Campaign</button>
        </div>

        {draft && (
          <div>
            <div className="field"><label>Campaign Name</label><input type="text" value={draft.name} onChange={e=>setDraft(Object.assign({},draft,{name:e.target.value}))} /></div>
            <div className="grid2">
              <div className="field"><label>Threat / Faction</label><input type="text" value={draft.threat} onChange={e=>setDraft(Object.assign({},draft,{threat:e.target.value}))} /></div>
              <div className="field"><label>Sector</label><input type="text" value={draft.sector} onChange={e=>setDraft(Object.assign({},draft,{sector:e.target.value}))} /></div>
            </div>
            <div className="grid2">
              <div className="field"><label>Join Window (days)</label><input type="number" value={draft.joinWindowDays} onChange={e=>setDraft(Object.assign({},draft,{joinWindowDays:Number(e.target.value)}))} /></div>
              <div className="field"><label>Duration (days)</label><input type="number" value={draft.durationDays} onChange={e=>setDraft(Object.assign({},draft,{durationDays:Number(e.target.value)}))} /></div>
            </div>
            <label style={{marginTop:8}}>Locations</label>
            {draft.locations.map((loc, idx) => (
              <div key={loc.id} style={{border:'1px solid var(--border)',borderRadius:2,padding:12,marginBottom:10}}>
                <div className="grid2">
                  <div className="field"><label>Location Name</label><input type="text" value={loc.name} onChange={e=>updateLocField(idx,'name',e.target.value)} /></div>
                  <div className="field"><label>Objective Description</label><input type="text" value={loc.objective} onChange={e=>updateLocField(idx,'objective',e.target.value)} /></div>
                </div>
                <div className="grid2">
                  <div className="field"><label>Category (drives auto-target formula)</label>
                    <select style={{width:'100%'}} value={loc.category} onChange={e=>updateLocField(idx,'category',e.target.value)}>
                      {LOCATION_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                    </select>
                  </div>
                  <div className="field"><label>Unit</label><input type="text" value={loc.unit} onChange={e=>updateLocField(idx,'unit',e.target.value)} /></div>
                </div>
                <div className="field"><label>Manual Target Override (optional — blank = auto-calculated from base rate × weeks × deployed count)</label><input type="number" value={loc.manualTarget||''} onChange={e=>updateLocField(idx,'manualTarget',e.target.value)} /></div>
                <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:8}}>Current computed target: {locationTarget(draft, loc)} {loc.unit}</div>
                <button className="small danger" onClick={()=>removeLocation(idx)}>Remove Location</button>
              </div>
            ))}
            <button className="ghost small" onClick={addLocation} style={{marginBottom:14}}>+ Add Location</button>

            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <button className="primary" onClick={saveCampaign}>Save Campaign</button>
              {!draft.lockedAt && <button className="ghost" onClick={forceLockWindow}>Force Lock Join Window Now</button>}
              {draft.lockedAt && !draft.resolved && <button className="ghost" onClick={()=>forceResolve('success')}>Force Resolve: Success</button>}
              {draft.lockedAt && !draft.resolved && <button className="danger" onClick={()=>forceResolve('failed')}>Force Resolve: Failed</button>}
              {savedMsg && <span style={{color:'var(--success)',fontSize:12}}>{savedMsg}</span>}
            </div>
            <div className="info-note">Join Window auto-locks and Campaigns auto-resolve based on real dates whenever the app loads — the Force buttons are for playtesting without waiting for real calendar days to pass.</div>
          </div>
        )}
      </div>

      <div className="panel">
        <div className="bracket-label">Admin — Roster Management</div>
        <table>
          <thead><tr><th>Callsign</th><th>Weekly Target</th><th>Age Division</th><th>Admin</th><th></th></tr></thead>
          <tbody>
            {operators.map(o => (
              <tr key={o.id}>
                <td className="disp" style={{fontFamily:"'Oswald',sans-serif"}}>{o.callsign}</td>
                <td><input type="number" value={o.weeklyTarget} onChange={e=>updateOpField(o.id,'weeklyTarget',e.target.value)} style={{width:60}} /></td>
                <td><select value={o.ageDivision} onChange={e=>updateOpField(o.id,'ageDivision',e.target.value)}>{AGE_DIVISIONS.map(a => <option key={a} value={a}>{a}</option>)}</select></td>
                <td><input type="checkbox" checked={!!o.isAdmin} onChange={e=>updateOpField(o.id,'isAdmin',e.target.checked)} /></td>
                <td>
                  {confirmDelete===o.id ? (
                    <span style={{display:'flex',gap:6}}>
                      <button className="small danger" onClick={()=>deleteOperator(o.id)}>Confirm</button>
                      <button className="small ghost" onClick={()=>setConfirmDelete(null)}>Cancel</button>
                    </span>
                  ) : <button className="small ghost" onClick={()=>setConfirmDelete(o.id)}>Delete</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
