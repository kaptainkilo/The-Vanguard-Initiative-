  .roster-name{font-weight:600;font-size:13px;letter-spacing:0.04em;}
  .roster-id{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;}

  .swatch-row{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:var(--text);}

  .exercise-pending{border:1px solid var(--border);border-radius:2px;padding:10px 12px;margin-bottom:8px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .set-row{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
  .set-row input{flex:1;}
  .set-row span{width:16px;text-align:center;color:var(--text-dim);font-size:11px;}

  .dossier-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:16px;}
  .dossier-avatar{width:64px;height:64px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:26px;font-weight:600;color:#1a1206;flex-shrink:0;}
  .field-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center;}
  .field-row:last-child{border-bottom:none;}
  .field-label{color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;}
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const AVATAR_COLORS = ['#FFB238','#E4572E','#6FCF97','#7CA9E8','#C98AD1','#F2C94C'];
const AGE_DIVISIONS = ['Cadet','Junior','Corps'];
const SPECIALIZATIONS = ['Heavy Assault','Recon','Guardian','Engineer','Command'];
const RANK_ORDER = ['Recruit','Operator','Senior Operator','Specialist','Vanguard'];
const RANK_THRESHOLDS = {'Operator':50,'Senior Operator':65,'Specialist':75,'Vanguard':90};

const EXERCISES = [
  {name:'Push-Up', category:'pushups', unit:'reps', alternatives:['Incline Push-Up','Decline Push-Up','Knee Push-Up','Weighted Push-Up','Diamond Push-Up','Archer Push-Up']},

  {name:'Walking Lunge', category:'legs_unilateral', unit:'reps', alternatives:['Bulgarian Split Squat','Step-Up']},
  {name:'Bulgarian Split Squat', category:'legs_unilateral', unit:'reps', alternatives:['Walking Lunge','Assisted Split Squat']},
  {name:'Leg Press', category:'squats', unit:'reps', alternatives:['Bulgarian Split Squat','Dumbbell Squat']},
  {name:'Calf Raise', category:'legs_iso', unit:'reps', alternatives:['Single-Leg Calf Raise']},
  {name:'Farmer Carry', category:'carry', unit:'reps', alternatives:['Kettlebell Carry','Backpack Carry']},
  {name:'Plank', category:'core', unit:'seconds', alternatives:['Knee Plank','Weighted Plank','Side Plank']},
  {name:'Hanging Knee Raise', category:'core', unit:'reps', alternatives:['Lying Leg Raise','Reverse Crunch']},
  {name:'Mountain Climbers', category:'core', unit:'reps', alternatives:['Russian Twist']},
  {name:'Running', category:'cardio_minutes', unit:'minutes', alternatives:['Rowing','Jump Rope','Assault Bike Intervals']},
  {name:'Rowing', category:'cardio_minutes', unit:'minutes', alternatives:['Running','Assault Bike Intervals']},
  {name:'Assault Bike Intervals', category:'cardio_minutes', unit:'minutes', alternatives:['Running','Rowing']},
  {name:'Jump Rope', category:'cardio_minutes', unit:'minutes', alternatives:['Jumping Jacks','High Knees']},
  {name:'Incline Walk', category:'cardio_minutes', unit:'minutes', alternatives:['Running','Rowing']},
  {name:'Burpees', category:'conditioning', unit:'reps', alternatives:['Step-Back Burpee']},
];

const CATEGORY_TO_KEYWORD = { pushups: 'push-up', squats: 'squat', cardio_minutes: 'cardio minute', pullups: 'pull-up' };

const DEFAULT_CAMPAIGN = {
  name: 'OPERATION FIRST LIGHT',
  threat: 'KHARVAX SWARM',
  startDate: null,
  durationDays: 28,
  locations: [
    { id: 'theta', name: 'Landing Zone Theta', objective: 'Total push-ups', unit: 'push-ups', target: 1500 },
    { id: 'rust', name: 'The Rust Fields', objective: 'Total cardio minutes', unit: 'minutes', target: 600 },
    { id: 'kappa', name: 'Signal Tower Kappa', objective: 'Total squats', unit: 'squats', target: 1200 },
    { id: 'hollow', name: 'The Hollow', objective: 'Squad Support actions logged', unit: 'actions', target: 8 },
  ]
};

const PROTOCOLS = ['Protocol Alpha', 'Protocol Bravo', 'Protocol Charlie'];

function todayStr(d) { d = d || new Date(); return d.toISOString().slice(0, 10); }
function daysBetween(a, b) { return Math.floor((new Date(b) - new Date(a)) / 86400000); }
function findLocationForCategory(campaign, category) {
  const kw = CATEGORY_TO_KEYWORD[category];
  if (!kw) return null;
  return campaign.locations.find(l => l.objective.toLowerCase().includes(kw)) || null;
}

async function loadShared(key, fallback) {
  try { const res = await window.storage.get(key, true); return res ? JSON.parse(res.value) : fallback; }
  catch (e) { return fallback; }
}
async function saveShared(key, value) {
  try { await window.storage.set(key, JSON.stringify(value), true); }
  catch (e) { console.error('storage save failed', e); }
}

function computeLocationProgress(campaign, logs) {
  return campaign.locations.map(loc => {
    const relevant = logs.filter(l => l.type === 'campaign' && l.locationId === loc.id);
    const groups = {};
    relevant.forEach(l => { const key = l.operatorId + '_' + l.date; (groups[key] = groups[key] || []).push(l); });
    let total = 0;
    Object.values(groups).forEach(entries => {
      entries.sort((a,b) => a.timestamp - b.timestamp);
      entries.forEach((e, idx) => { total += idx === 0 ? e.amount : e.amount * 0.5; });
    });
    const pct = Math.min(100, (total / loc.target) * 100);
    return Object.assign({}, loc, { total: Math.round(total * 10) / 10, pct: pct });
  });
}
function computePlanetControl(locProgress) {
  if (locProgress.length === 0) return 0;
  return locProgress.reduce((s, l) => s + l.pct, 0) / locProgress.length;
}
function computeORS(operatorId, operator, campaign, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  const firstLogDate = opLogs.length ? opLogs.reduce((min,l) => l.date < min ? l.date : min, opLogs[0].date) : todayStr();
  const windowDays = Math.min(30, Math.max(1, daysBetween(firstLogDate, todayStr()) + 1));
  const uniqueDaysWithLog = new Set(opLogs.map(l => l.date)).size;
  const protocolSessionDays = new Set(opLogs.filter(l => l.type === 'protocol').map(l => l.date)).size;
  const campaignLogs = opLogs.filter(l => l.type === 'campaign');
  const uniqueCampaignDays = new Set(campaignLogs.map(l => l.date)).size;
  const scheduledSessions = (operator.weeklyTarget / 7) * windowDays;
  const protocolCompletionRate = scheduledSessions > 0 ? Math.min(100, (protocolSessionDays / scheduledSessions) * 100) : 0;
  const aarSubmissionRate = Math.min(100, (uniqueDaysWithLog / windowDays) * 100);
  const campaignActiveDayRate = Math.min(100, (uniqueCampaignDays / windowDays) * 100);
  const weights = { physical: 0.30, discipline: 0.30, squad: 0.20 };
  const weightSum = weights.physical + weights.discipline + weights.squad;
  const norm = { physical: weights.physical/weightSum, discipline: weights.discipline/weightSum, squad: weights.squad/weightSum };
  const physical = protocolCompletionRate, discipline = aarSubmissionRate, squad = campaignActiveDayRate;
  const ors = Math.round(norm.physical*physical + norm.discipline*discipline + norm.squad*squad);
  return { ors: ors, physical: Math.round(physical), discipline: Math.round(discipline), squad: Math.round(squad), windowDays: windowDays };
}
function computeMCP(operatorId, campaign, logs, planetPct) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  const protocolDays = new Set(opLogs.filter(function(l){return l.type==='protocol';}).map(function(l){return l.date;})).size;
  const campaignEntries = opLogs.filter(function(l){return l.type==='campaign';}).length;
  let mcp = protocolDays*10 + campaignEntries*5;
  if (planetPct >= 100 && opLogs.some(function(l){return l.type==='campaign';})) mcp += 50;
  return mcp;
}
function computeReadinessStatus(operatorId, logs) {
  const opLogs = logs.filter(l => l.operatorId === operatorId);
  if (opLogs.length === 0) return { label: 'Active', days: 0, cls: 'status-active' };
  const lastDate = opLogs.reduce((max,l) => l.date > max ? l.date : max, opLogs[0].date);
  const inactiveDays = daysBetween(lastDate, todayStr());
  if (inactiveDays <= 7) return { label: 'Active', days: inactiveDays, cls: 'status-active' };
  if (inactiveDays <= 14) return { label: 'Alert', days: inactiveDays, cls: 'status-alert' };
  if (inactiveDays <= 30) return { label: 'Standby', days: inactiveDays, cls: 'status-standby' };
  if (inactiveDays <= 60) return { label: 'Reserve', days: inactiveDays, cls: 'status-reserve' };
  return { label: 'Deep Reserve', days: inactiveDays, cls: 'status-deep' };
}
function computeRank(ors, campaign, operatorId, logs, status) {
  const campaignDaysElapsed = Math.max(1, daysBetween(campaign.startDate, todayStr()) + 1);
  const opCampaignLogs = logs.filter(l => l.operatorId === operatorId && l.type === 'campaign');
  const uniqueCampaignDays = new Set(opCampaignLogs.map(l => l.date)).size;
  const activeDayRate = (uniqueCampaignDays / campaignDaysElapsed) * 100;
  if (ors >= 90 && status.label === 'Active') return 'Vanguard';
  if (ors >= 75 && status.label === 'Active') return 'Specialist';
  if (ors >= 65 && status.label === 'Active') return 'Senior Operator';
  if (ors >= 50 && activeDayRate >= 50 && status.label === 'Active') return 'Operator';
  return 'Recruit';
}
function nextRankInfo(currentRank, ors, status) {
  const idx = RANK_ORDER.indexOf(currentRank);
  if (idx === -1 || idx === RANK_ORDER.length-1) return null;
  const next = RANK_ORDER[idx+1];
  const threshold = RANK_THRESHOLDS[next];
  const eligible = ors >= threshold && status.label === 'Active';
  return { next: next, threshold: threshold, eligible: eligible };
}

function Gauge(props) {
  const pct = props.pct;
  const deg = Math.round((pct/100)*360);
  return React.createElement('div', {className:'gauge', style:{background:'conic-gradient(var(--amber) '+deg+'deg, var(--panel-alt) '+deg+'deg)'}},
    React.createElement('div', {className:'gauge-inner'},
      React.createElement('div', {className:'gauge-pct'}, Math.round(pct)+'%'),
      React.createElement('div', {className:'gauge-label'}, 'Control')
    )
  );
}
function SubBar(props) {
  return (
    <div className="sub-bar-row">
      <div className="sub-bar-label">{props.label}</div>
      <div className="sub-bar-track"><div className="sub-bar-fill" style={{width: props.val+'%'}}></div></div>
      <div className="sub-bar-val">{props.val}</div>
    </div>
  );
}
function Avatar(props) {
  const op = props.op; const s = props.size || 52;
  return <div className="avatar" style={{width:s,height:s,fontSize:s*0.38,background:op.avatarColor}}>{op.callsign.charAt(0)}</div>;
}

function Login({ operators, onLogin, onEnroll }) {
  const [enrolling, setEnrolling] = useState(false);
  const [pinTarget, setPinTarget] = useState(null);
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState('');

  function tryLogin(op) {
    if (op.pin) { setPinTarget(op); setPinInput(''); setPinError(''); }
    else onLogin(op.id);
  }
  function submitPin() {
    if (pinInput === pinTarget.pin) onLogin(pinTarget.id);
    else setPinError('Incorrect access code.');
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="disp login-title">Vanguard // Personnel Terminal</div>
        <div className="login-sub">United Earth Alliance — Access Required</div>
        <div className="roster-grid">
          {operators.map(op => (
            <div key={op.id} className="roster-card" onClick={() => tryLogin(op)}>
              <Avatar op={op} />
              <div className="roster-name disp">{op.callsign}</div>
              <div className="roster-id">{op.idNum}</div>
            </div>
          ))}
        </div>
        <button className="primary" style={{width:'100%'}} onClick={() => setEnrolling(true)}>Enroll New Operator</button>

        {pinTarget && (
          <div className="modal-overlay" onClick={() => setPinTarget(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="disp" style={{fontSize:16,marginBottom:14}}>Access Code — {pinTarget.callsign}</div>
              <input type="password" maxLength="4" value={pinInput} onChange={e=>setPinInput(e.target.value)} placeholder="****" />
              {pinError && <div className="threat" style={{fontSize:12,marginTop:8}}>{pinError}</div>}
              <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:16}}>
                <button className="ghost" onClick={()=>setPinTarget(null)}>Cancel</button>

}

function App() {

  const [operators, setOperators] = useState([]);
  const [campaign, setCampaign] = useState(DEFAULT_CAMPAIGN);
  const [logs, setLogs] = useState([]);
  const [activeOpId, setActiveOpId] = useState(null);
  const [tab, setTab] = useState('command');
  const [showReset, setShowReset] = useState(false);
  const [viewDossierId, setViewDossierId] = useState(null);

  useEffect(() => {
    (async () => {
      const ops = await loadShared('vanguard-operators', []);
      let camp = await loadShared('vanguard-campaign', null);
      if (!camp) { camp = Object.assign({}, DEFAULT_CAMPAIGN, {startDate: todayStr()}); await saveShared('vanguard-campaign', camp); }
      const lg = await loadShared('vanguard-logs', []);
      setOperators(ops); setCampaign(camp); setLogs(lg); setLoaded(true);
    })();
  }, []);

  async function addLogs(entries) {
    const newLogs = logs.concat(entries);
    setLogs(newLogs);
    await saveShared('vanguard-logs', newLogs);
  }
  async function enrollOperator(op) {
    const newOps = operators.concat([op]);
    setOperators(newOps);
    await saveShared('vanguard-operators', newOps);
    setActiveOpId(op.id);
  }
  async function resetAll() {
    const camp = Object.assign({}, DEFAULT_CAMPAIGN, {startDate: todayStr()});
    setCampaign(camp); setLogs([]);
    await saveShared('vanguard-campaign', camp);
    await saveShared('vanguard-logs', []);
    setShowReset(false);
  }

  if (!loaded) return <div style={{padding:40,fontFamily:'IBM Plex Mono, monospace',color:'#8A93A6'}}>ESTABLISHING UPLINK...</div>;

  if (!activeOpId) {
    return <Login operators={operators} onLogin={setActiveOpId} onEnroll={enrollOperator} />;
  }

  const op = operators.find(o => o.id === activeOpId);
  if (!op) { setActiveOpId(null); return null; }

  const dossierOp = viewDossierId ? operators.find(o=>o.id===viewDossierId) : op;

  return (
    <div>
      <div className="topbar">
        <div className="brand" onClick={()=>{setTab('command'); setViewDossierId(null);}}>
          <div className="brand-dot"></div>
          <div>
            <div className="disp brand-title">Vanguard // Personnel Terminal</div>
            <div className="brand-sub">United Earth Alliance — Alpha Cell</div>
          </div>
        </div>
        <div className="topbar-right">
          <div className="who"><Avatar op={op} size={28} /> {op.callsign}</div>
          <button className="ghost small" onClick={()=>setActiveOpId(null)}>Log Out</button>
          <button className="ghost small" onClick={() => setShowReset(true)}>Reset Test Data</button>
        </div>
      </div>

      <div className="layout">
        <div className="nav">
          {['command','log','dossier','roster','aar'].map(t => (
            <div key={t} className={"nav-item"+(tab===t?" active":"")} onClick={() => {setTab(t); if(t==='dossier') setViewDossierId(op.id);}}>
              {t==='command' && 'Command Center'}
              {t==='log' && 'Log Activity'}
              {t==='dossier' && 'My Dossier'}
              {t==='roster' && 'Roster'}
              {t==='aar' && 'AAR Log'}
            </div>
          ))}
        </div>
        <div className="main">
          {tab==='command' && <CommandCenter operators={operators} campaign={campaign} logs={logs} activeOp={op} />}
          {tab==='log' && <LogActivity campaign={campaign} activeOp={op} logs={logs} addLogs={addLogs} />}
          {tab==='dossier' && <Dossier op={dossierOp} operators={operators} campaign={campaign} logs={logs} />}
          {tab==='roster' && <Roster operators={operators} campaign={campaign} logs={logs} onView={(id)=>{setViewDossierId(id); setTab('dossier');}} />}
          {tab==='aar' && <AARLog operators={operators} campaign={campaign} logs={logs} />}
        </div>
      </div>

      {showReset && (
        <div className="modal-overlay" onClick={() => setShowReset(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="disp" style={{fontSize:16,marginBottom:10}}>Reset all test data?</div>
            <div className="dim" style={{fontSize:13,marginBottom:18}}>Clears every logged AAR and resets Operation First Light's Control % to 0%. Operators are kept. Cannot be undone.</div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="ghost" onClick={() => setShowReset(false)}>Cancel</button>

      )}

  const locProgress = useMemo(() => computeLocationProgress(campaign, logs), [campaign, logs]);
  const planetPct = computePlanetControl(locProgress);
  const orsData = computeORS(activeOp.id, activeOp, campaign, logs);
  const status = computeReadinessStatus(activeOp.id, logs);
  const rank = computeRank(orsData.ors, campaign, activeOp.id, logs, status);
  const daysElapsed = daysBetween(campaign.startDate, todayStr());
  const daysLeft = Math.max(0, campaign.durationDays - daysElapsed);

  return (
    <div>
      <div className="panel">
        <div className="bracket-label">Active Campaign</div>
        <div className="disp panel-title">{campaign.name}</div>
        <div className="dim mono" style={{fontSize:12}}>Threat: {campaign.threat} · {daysLeft} days remaining</div>
        <div style={{marginTop:18}} className="gauge-wrap">
          <Gauge pct={planetPct} />
          <div style={{flex:1,minWidth:220}}>
            {locProgress.map(loc => (
              <div key={loc.id} className="loc-row">
                <div className="loc-head"><span className="loc-name">{loc.name}</span><span className="loc-pct mono">{Math.round(loc.pct)}%</span></div>
                <div className="bar-track"><div className="bar-fill" style={{width: loc.pct+'%'}}></div></div>
                <div className="loc-target">{loc.total} / {loc.target} {loc.unit}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="grid2">
        <div className="panel">
          <div className="bracket-label">Operator Status — {activeOp.callsign}</div>
          <div className="stat-row"><span>Rank</span><span className="pill rank">{rank}</span></div>
          <div className="stat-row"><span>Readiness (ORS)</span><span className="stat-val">{orsData.ors} / 100</span></div>
          <div className="stat-row"><span>Status</span><span className={"status-pill "+status.cls}>{status.label}</span></div>
          <div className="sub-bars">
            <SubBar label="Physical Capability" val={orsData.physical} />
            <SubBar label="Mission Discipline" val={orsData.discipline} />
            <SubBar label="Squad Contribution" val={orsData.squad} />
          </div>
        </div>
        <div className="panel">
          <div className="bracket-label">Quick Reference</div>
          <div className="dim" style={{fontSize:12,lineHeight:1.8}}>
            First log per Location per day counts 1:1. Additional logs same day, same Location count at 50%.<br/><br/>
            Logging a Protocol exercise that matches an active Location's objective (push-ups, squats, cardio minutes) auto-credits that Location — no need to log it twice.
          </div>
        </div>
      </div>
    </div>
  );
}

function LogActivity({ campaign, activeOp, logs, addLogs }) {
  const [mode, setMode] = useState('protocol');
  const [protocolLabel, setProtocolLabel] = useState(PROTOCOLS[0]);
  const [pending, setPending] = useState([]);
  const [exName, setExName] = useState(EXERCISES[0].name);
  const [variant, setVariant] = useState(EXERCISES[0].name);
  const [sets, setSets] = useState([{reps:'', weight:''}]);
  const [duration, setDuration] = useState('');
  const [feedback, setFeedback] = useState(null);

  const [locationId, setLocationId] = useState(campaign.locations[0].id);
  const [amount, setAmount] = useState('');

  const exObj = EXERCISES.find(e => e.name === exName);
  const isTimeBased = exObj.unit === 'minutes' || exObj.unit === 'seconds';

  function updateSet(i, field, val) {
    const ns = sets.slice(); ns[i] = Object.assign({}, ns[i], {[field]: val}); setSets(ns);
  }
  function addSetRow() { setSets(sets.concat([{reps:'', weight:''}])); }
  function removeSetRow(i) { setSets(sets.filter((_,idx)=>idx!==i)); }

  function addExerciseToPending() {
    let totalValue = 0;
    let detail = '';
    if (isTimeBased) {
      totalValue = parseFloat(duration) || 0;
      detail = totalValue + ' ' + exObj.unit;
    } else {
      totalValue = sets.reduce((s,st) => s + (parseFloat(st.reps)||0), 0);
      detail = sets.map(st => (st.reps||0)+(st.weight?'@'+st.weight+'lb':'')).join(', ');
    }
    if (totalValue <= 0) return;
    setPending(pending.concat([{
      exercise: exName, variant: variant, category: exObj.category, unit: exObj.unit,
      isTimeBased: isTimeBased, sets: isTimeBased ? [] : sets.filter(s=>s.reps), totalValue: totalValue, detail: detail
    }]));
    setSets([{reps:'',weight:''}]); setDuration('');
  }
  function removePending(i) { setPending(pending.filter((_,idx)=>idx!==i)); }

  async function submitSession() {
    if (pending.length === 0) return;
    const entries = [];
    const now = Date.now();
    const autoNotes = [];
    pending.forEach((ex, i) => {
      const ts = now + i*2;
      const logId = 'log_'+ts;
      entries.push({
        id: logId, operatorId: activeOp.id, type:'protocol', date: todayStr(), timestamp: ts,
        protocolLabel: protocolLabel, exercise: ex.exercise, variant: ex.variant, category: ex.category,
        unit: ex.unit, sets: ex.sets, totalValue: ex.totalValue, detail: ex.detail,
      });
      const loc = findLocationForCategory(campaign, ex.category);
      if (loc) {
        const alreadyToday = logs.filter(l => l.type==='campaign' && l.operatorId===activeOp.id && l.locationId===loc.id && l.date===todayStr())
          .concat(entries.filter(e2 => e2.type==='campaign' && e2.locationId===loc.id));
        const isFirst = alreadyToday.length === 0;
        entries.push({
          id: logId+'_auto', operatorId: activeOp.id, type:'campaign', locationId: loc.id,
          amount: ex.totalValue, date: todayStr(), timestamp: ts+1, source:'protocol-auto', sourceExercise: ex.exercise,
        });
        autoNotes.push(ex.exercise+' ('+ex.totalValue+' '+ex.unit+') auto-credited to '+loc.name+(isFirst?'':' at half value (soft cap)'));
      }
    });
    await addLogs(entries);
    setFeedback({
      win: true,
      text: 'Session logged, '+activeOp.callsign+'. '+pending.length+' exercise(s) recorded.' + (autoNotes.length ? ' ' + autoNotes.join('. ') + '.' : ' No active Campaign Location matched this session\u2019s exercises.')
    });
    setPending([]);
  }

  function submitManualCampaign() {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) { setFeedback({cap:false, text:'Enter a valid amount before submitting, Operator.'}); return; }
    const now = Date.now();
    const entry = { id:'log_'+now, operatorId: activeOp.id, type:'campaign', locationId: locationId, amount: amt, date: todayStr(), timestamp: now };
    const todaysAtLoc = logs.filter(l => l.type==='campaign' && l.operatorId===activeOp.id && l.locationId===locationId && l.date===todayStr());
    addLogs([entry]);
    if (todaysAtLoc.length >= 1) {
      setFeedback({cap:true, text:"Contribution logged, Operator. Today's push is in \u2014 Command's got it. Anything more today still counts, just at half value. That's not a penalty. That's the mission reminding you recovery is part of it too. The Swarm doesn't stop. You're allowed to."});
    } else {
      setFeedback({cap:false, text:'Contribution logged, Operator. Command sees it.'});
    }
    setAmount('');
  }

  const loc = campaign.locations.find(l => l.id === locationId);

  return (
    <div className="panel">
      <div className="bracket-label">Log Activity — {activeOp.callsign}</div>
      <div className="field">
        <label>Activity Type</label>
        <div className="radio-group">
          <div className={"radio-opt"+(mode==='protocol'?' sel':'')} onClick={()=>{setMode('protocol'); setFeedback(null);}}>Protocol Session</div>
          <div className={"radio-opt"+(mode==='campaign'?' sel':'')} onClick={()=>{setMode('campaign'); setFeedback(null);}}>Campaign Contribution (manual)</div>
        </div>
      </div>

      {mode === 'protocol' && (
        <div>
          <div className="field">
            <label>Protocol</label>
            <select style={{width:'100%'}} value={protocolLabel} onChange={e=>setProtocolLabel(e.target.value)}>
              {PROTOCOLS.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          </div>

          <div style={{border:'1px solid var(--border)', borderRadius:2, padding:14, marginBottom:14}}>
            <div className="field">
              <label>Exercise</label>
              <select style={{width:'100%'}} value={exName} onChange={e=>{setExName(e.target.value); setVariant(e.target.value);}}>
                {EXERCISES.map(ex => <option key={ex.name} value={ex.name}>{ex.name}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Variant / Substitution Used</label>
              <select style={{width:'100%'}} value={variant} onChange={e=>setVariant(e.target.value)}>
                <option value={exObj.name}>{exObj.name} (standard)</option>
                {exObj.alternatives.map(a => <option key={a} value={a}>{a}</option>)}
              </select>
            </div>

            {isTimeBased ? (
              <div className="field"><label>Duration ({exObj.unit})</label><input type="number" value={duration} onChange={e=>setDuration(e.target.value)} placeholder="e.g. 20" /></div>
            ) : (
              <div className="field">
                <label>Sets</label>
                {sets.map((s,i) => (
                  <div className="set-row" key={i}>
                    <span>{i+1}</span>
                    <input type="number" placeholder="Reps" value={s.reps} onChange={e=>updateSet(i,'reps',e.target.value)} />
                    <input type="number" placeholder="Weight (lb, optional)" value={s.weight} onChange={e=>updateSet(i,'weight',e.target.value)} />
                    {sets.length>1 && <button className="small ghost" onClick={()=>removeSetRow(i)}>✕</button>}
                  </div>
                ))}
                <button className="small ghost" onClick={addSetRow} style={{marginTop:6}}>+ Add Set</button>
              </div>
            )}
            <button className="primary" onClick={addExerciseToPending} style={{marginTop:6}}>Add Exercise to Session</button>
          </div>

          {pending.length > 0 && (
            <div style={{marginBottom:16}}>
              <label>Pending Session ({pending.length})</label>
              {pending.map((ex,i) => (
                <div className="exercise-pending" key={i}>
                  <div><strong>{ex.variant}</strong> {ex.variant!==ex.exercise && <span className="dim">({ex.exercise} sub)</span>} — {ex.detail}</div>
                  <button className="small ghost" onClick={()=>removePending(i)}>Remove</button>
                </div>
              ))}
              <button className="primary" onClick={submitSession} style={{marginTop:8,width:'100%'}}>Submit Session AAR</button>
            </div>
          )}
        </div>
      )}

      {mode === 'campaign' && (
        <div>
          <div className="field">
            <label>Location</label>
            <div className="loc-pick">
              {campaign.locations.map(l => (
                <div key={l.id} className={"loc-opt"+(locationId===l.id?' sel':'')} onClick={()=>setLocationId(l.id)}>
                  <div className="loc-opt-name">{l.name}</div><div className="loc-opt-obj">{l.objective}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="field"><label>Amount ({loc.unit})</label><input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="e.g. 1" /></div>
          <button className="primary" onClick={submitManualCampaign}>Submit to Command</button>
        </div>
      )}

      {feedback && <div className={"feedback"+(feedback.cap?' cap':'')+(feedback.win?' win':'')}>{feedback.text}</div>}
    </div>
  );
}

function Dossier({ op, operators, campaign, logs }) {
  const locProgress = useMemo(() => computeLocationProgress(campaign, logs), [campaign, logs]);
  if (!op) return null;
  const planetPct = computePlanetControl(locProgress);
  const orsData = computeORS(op.id, op, campaign, logs);
  const status = computeReadinessStatus(op.id, logs);
  const rank = computeRank(orsData.ors, campaign, op.id, logs, status);
  const mcp = computeMCP(op.id, campaign, logs, planetPct);
  const nri = nextRankInfo(rank, orsData.ors, status);
  const hasParticipated = logs.some(l => l.operatorId === op.id);
  const completed = (planetPct >= 100 && hasParticipated) ? [campaign.name] : [];

  return (
    <div className="panel">
      <div className="dossier-header">
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          <div className="dossier-avatar" style={{background:op.avatarColor}}>{op.callsign.charAt(0)}</div>
          <div>
            <div className="disp" style={{fontSize:24}}>{op.callsign}</div>
            <div className="dim mono" style={{fontSize:11}}>{op.idNum} · Enlisted {op.joinDate}</div>
          </div>
        </div>
        <span className={nri && nri.eligible ? "pill eligible" : "pill not-eligible"}>{nri ? (nri.eligible ? 'Promotion Eligible' : 'Not Eligible') : 'Max Rank'}</span>
      </div>

      <div className="grid2">
        <div>
          <div style={{marginBottom:18}}>
            <div className="field-label" style={{marginBottom:4}}># ORS</div>
            <div className="disp" style={{fontSize:26}}>{orsData.ors}</div>
            <div className="bar-track" style={{marginTop:6}}><div className="bar-fill" style={{width:orsData.ors+'%'}}></div></div>
          </div>
          <div style={{marginBottom:18}}>
            <div className="field-label" style={{marginBottom:4}}># Physical Capability</div>
            <div className="disp" style={{fontSize:20}}>{orsData.physical}</div>
            <div className="bar-track" style={{marginTop:6}}><div className="bar-fill" style={{width:orsData.physical+'%'}}></div></div>
          </div>
          <div style={{marginBottom:18}}>
            <div className="field-label" style={{marginBottom:4}}># Mission Discipline</div>
            <div className="disp" style={{fontSize:20}}>{orsData.discipline}</div>
            <div className="bar-track" style={{marginTop:6}}><div className="bar-fill" style={{width:orsData.discipline+'%'}}></div></div>
          </div>
          <div style={{marginBottom:18}}>
            <div className="field-label" style={{marginBottom:4}}># Squad Contribution</div>
            <div className="disp" style={{fontSize:20}}>{orsData.squad}</div>
            <div className="bar-track" style={{marginTop:6}}><div className="bar-fill" style={{width:orsData.squad+'%'}}></div></div>
          </div>
          <div style={{marginBottom:18}}>
            <div className="field-label" style={{marginBottom:4}}># Mission Contribution Points</div>
            <div className="disp" style={{fontSize:20}}>{mcp}</div>
          </div>
        </div>

        <div>
          <div className="field-row"><span className="field-label">Status</span><span className={"status-pill "+status.cls}>{status.label}</span></div>
          <div className="field-row"><span className="field-label">Name</span><span>{op.realName || '\u2014'}</span></div>
          <div className="field-row"><span className="field-label">ID</span><span className="mono">{op.idNum}</span></div>
          <div className="field-row"><span className="field-label">Join Date</span><span>{op.joinDate}</span></div>
          <div className="field-row"><span className="field-label">Age Division</span><span className="pill">{op.ageDivision}</span></div>
          <div className="field-row"><span className="field-label">Rank</span><span className="pill rank">{rank}</span></div>
          <div className="field-row"><span className="field-label">Specialization</span><span className="pill">{op.specialization}</span></div>
          <div className="field-row"><span className="field-label">Squad</span><span>{op.squad}</span></div>
          <div className="field-row"><span className="field-label">Privacy Level</span><span className="pill">{op.privacy}</span></div>
          <div className="field-row"><span className="field-label">Current Campaign</span><span>{(planetPct < 100 && hasParticipated) ? campaign.name : '\u2014'}</span></div>
          <div className="field-row"><span className="field-label">Completed Campaigns</span><span>{completed.length ? completed.join(', ') : 'None yet'}</span></div>
          <div className="field-row"><span className="field-label">Awards</span><span>None yet</span></div>
        </div>
      </div>
      <div className="info-note">Simplified ORS/MCP formula for playtesting. Baseline Improvement and Personal Development are excluded (no assessment/habit tracking in this prototype); weight redistributes across the remaining categories per Section 11's zero-denominator rule.</div>
    </div>
  );
}

function Roster({ operators, campaign, logs, onView }) {
  return (
    <div className="panel">
      <div className="bracket-label">Alpha Cell — Roster</div>
      <table>
        <thead><tr><th>Callsign</th><th>Rank</th><th>ORS</th><th>Status</th><th>Last Active</th></tr></thead>
        <tbody>
          {operators.map(op => {
            const orsData = computeORS(op.id, op, campaign, logs);
            const status = computeReadinessStatus(op.id, logs);
            const rank = computeRank(orsData.ors, campaign, op.id, logs, status);
            const opLogs = logs.filter(l => l.operatorId===op.id);
            const lastActive = opLogs.length ? opLogs.reduce((max,l)=>l.date>max?l.date:max, opLogs[0].date) : '\u2014';
            return (
              <tr key={op.id} className="clickable" onClick={()=>onView(op.id)}>
                <td className="disp" style={{fontFamily:"'Oswald',sans-serif"}}>{op.callsign}</td>
                <td>{rank}</td>
                <td className="amber">{orsData.ors}</td>
                <td><span className={"status-pill "+status.cls}>{status.label}</span></td>
                <td>{lastActive}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function AARLog({ operators, campaign, logs }) {
  const sorted = logs.slice().sort((a,b) => b.timestamp - a.timestamp);
  const opName = id => { const o = operators.find(o=>o.id===id); return o ? o.callsign : id; };
  const locName = id => { const l = campaign.locations.find(l=>l.id===id); return l ? l.name : id; };

  if (sorted.length === 0) {
    return <div className="panel"><div className="empty"><div className="empty-title">No AARs filed yet.</div><div>Log your first Protocol session or Campaign contribution to see it here.</div></div></div>;
  }

  return (
    <div className="panel">
      <div className="bracket-label">After Action Reports — Full Log</div>
      <table>
        <thead><tr><th>Date</th><th>Operator</th><th>Type</th><th>Detail</th><th>Value</th></tr></thead>
        <tbody>
          {sorted.map(l => (
            <tr key={l.id}>
              <td>{l.date}</td>
              <td>{opName(l.operatorId)}</td>
              <td>{l.type === 'protocol' ? 'Protocol' : (l.source==='protocol-auto' ? 'Campaign (auto)' : 'Campaign')}</td>
              <td>{l.type === 'protocol' ? (l.variant+' — '+l.detail) : (locName(l.locationId) + (l.sourceExercise ? (' (from '+l.sourceExercise+')') : ''))}</td>
              <td>{l.type === 'protocol' ? (l.totalValue+' '+l.unit) : l.amount}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
